<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการสถานชีวาภิบาล วัดทับคล้อ (Supabase)</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- SheetJS (Excel Export) -->
    <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Prompt', sans-serif; background-color: #f3f4f6; }
        .tab-active { border-bottom: 2px solid #0ea5e9; color: #0ea5e9; font-weight: 600; }
        .tab-inactive { color: #6b7280; }
        .tab-inactive:hover { color: #374151; }
        
        /* Hide scrollbar for clean UI but keep functionality */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="text-gray-800 h-screen flex overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-64 bg-white shadow-md flex-shrink-0 flex flex-col z-10 transition-all duration-300">
        <div class="p-6 border-b border-gray-100 flex items-center gap-3">
            <i class="ph ph-heartbeat text-3xl text-rose-500"></i>
            <div>
                <h1 class="font-bold text-lg leading-tight text-gray-800">สถานชีวาภิบาล</h1>
                <p class="text-xs text-gray-500">วัดทับคล้อ</p>
            </div>
        </div>
        <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
            <button onclick="navigate('dashboard')" id="nav-dashboard" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left transition-colors text-gray-600 hover:bg-sky-50 hover:text-sky-600">
                <i class="ph ph-squares-four text-xl"></i>
                <span>แดชบอร์ด</span>
            </button>
            <button onclick="navigate('patients')" id="nav-patients" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left transition-colors text-gray-600 hover:bg-sky-50 hover:text-sky-600">
                <i class="ph ph-users text-xl"></i>
                <span>รายชื่อผู้ป่วย</span>
            </button>
            <button onclick="navigate('add-patient')" id="nav-add-patient" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left transition-colors text-gray-600 hover:bg-sky-50 hover:text-sky-600">
                <i class="ph ph-user-plus text-xl"></i>
                <span>เพิ่มผู้ป่วยใหม่</span>
            </button>
        </nav>
        <div class="p-4 border-t border-gray-100 text-xs text-green-600 font-medium text-center bg-green-50">
            <i class="ph ph-cloud-check"></i> Connected to Supabase
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-screen overflow-hidden bg-gray-50">
        <!-- Header for Mobile / General Info -->
        <header class="bg-white shadow-sm px-8 py-4 flex justify-between items-center z-0">
            <h2 id="page-title" class="text-xl font-semibold text-gray-700">แดชบอร์ด</h2>
            <div class="flex items-center gap-4">
                <span class="text-sm text-gray-500"><i class="ph ph-clock mr-1"></i> <span id="current-date"></span></span>
                <div class="h-8 w-8 rounded-full bg-sky-100 text-sky-600 flex items-center justify-center font-bold">
                    จน
                </div>
            </div>
        </header>

        <!-- Dynamic Content Area -->
        <div id="app-content" class="flex-1 overflow-y-auto p-4 md:p-8">
            <!-- Content gets injected here by JS -->
        </div>
    </main>

    <script>
        // --- SUPABASE SETUP ---
        const SUPABASE_URL = 'https://hompmaasqrbuwxejswun.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhvbXBtYWFzcXJidXd4ZWpzd3VuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzMjY5NTAsImV4cCI6MjA5NTkwMjk1MH0.QvnuDBUU5g_EZtE3Vkc_1hc7xXmZlvrIR0eFRGqpaQM';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // --- DATA & STATE MANAGEMENT ---
        const state = {
            currentView: 'dashboard',
            patients: [],
            dailyRecords: [],
            selectedPatientId: null,
            detailTab: 'info' // info, medical, records
        };

        // Temporary arrays used in Patient Form to hold medications & blood tests dynamically
        window.tempMedications = [];
        window.tempBloodTests = [];

        // --- FETCH DATA FROM SUPABASE ---
        async function fetchInitialData() {
            try {
                // ดึงข้อมูลผู้ป่วย
                const { data: patientsData, error: err1 } = await supabaseClient.from('patients').select('*');
                if (err1) throw err1;
                state.patients = patientsData || [];

                // ดึงข้อมูลบันทึกรายวัน
                const { data: recordsData, error: err2 } = await supabaseClient.from('daily_records').select('*');
                if (err2) throw err2;
                state.dailyRecords = recordsData || [];

                // วาดหน้าจอใหม่หลังจากได้ข้อมูล
                render();
            } catch (error) {
                console.error('Error fetching data:', error);
                alert('ไม่สามารถดึงข้อมูลจาก Supabase ได้ (โปรดตรวจสอบการตั้งค่า RLS ใน Supabase)');
            }
        }

        // --- UTILITIES ---
        const formatDate = (dateStr) => {
            if(!dateStr) return '-';
            const d = new Date(dateStr);
            return d.toLocaleDateString('th-TH', { year: 'numeric', month: 'short', day: 'numeric' });
        };

        const parseBP = (bpStr) => {
            if(!bpStr || !bpStr.includes('/')) return { sys: null, dia: null };
            const parts = bpStr.split('/');
            return {
                sys: parseInt(parts[0]) || null,
                dia: parseInt(parts[1]) || null
            };
        };

        document.getElementById('current-date').innerText = new Date().toLocaleDateString('th-TH', { year: 'numeric', month: 'long', day: 'numeric' });

        // --- ROUTING & RENDER LOOP ---
        function navigate(view, params = {}) {
            state.currentView = view;
            if(params.patientId) state.selectedPatientId = params.patientId;
            if(params.tab) state.detailTab = params.tab;
            
            // Setup / Reset temporary variables for adding/editing patient form
            if (view === 'add-patient') {
                const p = state.selectedPatientId ? state.patients.find(x => x.id === state.selectedPatientId) : {};
                window.tempMedications = p.medicationsList ? JSON.parse(JSON.stringify(p.medicationsList)) : [];
                window.tempBloodTests = p.bloodTestsList ? JSON.parse(JSON.stringify(p.bloodTestsList)) : [];
            }
            
            // Update Active Nav
            document.querySelectorAll('nav button').forEach(btn => {
                btn.classList.remove('bg-sky-100', 'text-sky-700', 'font-medium');
                btn.classList.add('text-gray-600');
            });
            
            const activeBtn = document.getElementById(`nav-${view === 'patient-detail' ? 'patients' : view}`);
            if(activeBtn) {
                activeBtn.classList.remove('text-gray-600');
                activeBtn.classList.add('bg-sky-100', 'text-sky-700', 'font-medium');
            }

            // Update Title
            const titles = {
                'dashboard': 'แดชบอร์ดสรุปข้อมูล',
                'patients': 'ระบบจัดการรายชื่อผู้ป่วย',
                'add-patient': 'เพิ่ม/แก้ไข ข้อมูลผู้ป่วย',
                'patient-detail': 'รายละเอียดผู้ป่วย'
            };
            document.getElementById('page-title').innerText = titles[view] || 'ระบบจัดการสถานชีวาภิบาล';

            render();
        }

        function render() {
            const content = document.getElementById('app-content');
            content.innerHTML = ''; // clear

            switch(state.currentView) {
                case 'dashboard': renderDashboard(content); break;
                case 'patients': renderPatients(content); break;
                case 'add-patient': renderPatientForm(content); break;
                case 'patient-detail': renderPatientDetail(content); break;
            }
        }

        // --- VIEWS ---

        // 1. DASHBOARD
        function renderDashboard(container) {
            const totalPatients = state.patients.length;
            const palliativeCount = state.patients.filter(p => p.patientType && p.patientType.includes('Palliative')).length;
            
            let adlCounts = { 'พึ่งพิงสมบูรณ์': 0, 'พึ่งพิงบางส่วน': 0, 'ช่วยเหลือตัวเองได้': 0 };
            state.patients.forEach(p => {
                if(p.adlScore && p.adlScore.includes('สมบูรณ์')) adlCounts['พึ่งพิงสมบูรณ์']++;
                else if(p.adlScore && p.adlScore.includes('บางส่วน')) adlCounts['พึ่งพิงบางส่วน']++;
                else adlCounts['ช่วยเหลือตัวเองได้']++;
            });

            container.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex items-center justify-between">
                        <div>
                            <p class="text-gray-500 text-sm">ผู้ป่วยทั้งหมด</p>
                            <h3 class="text-3xl font-bold text-gray-800">${totalPatients} <span class="text-base font-normal">คน</span></h3>
                        </div>
                        <div class="h-12 w-12 rounded-full bg-blue-50 flex items-center justify-center text-blue-500 text-2xl">
                            <i class="ph ph-users"></i>
                        </div>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex items-center justify-between">
                        <div>
                            <p class="text-gray-500 text-sm">ผู้ป่วย Palliative Care</p>
                            <h3 class="text-3xl font-bold text-rose-600">${palliativeCount} <span class="text-base font-normal">คน</span></h3>
                        </div>
                        <div class="h-12 w-12 rounded-full bg-rose-50 flex items-center justify-center text-rose-500 text-2xl">
                            <i class="ph ph-heartbeat"></i>
                        </div>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex items-center justify-between">
                        <div>
                            <p class="text-gray-500 text-sm">ผู้ป่วยที่ต้องพึ่งพิงสมบูรณ์</p>
                            <h3 class="text-3xl font-bold text-orange-500">${adlCounts['พึ่งพิงสมบูรณ์']} <span class="text-base font-normal">คน</span></h3>
                        </div>
                        <div class="h-12 w-12 rounded-full bg-orange-50 flex items-center justify-center text-orange-500 text-2xl">
                            <i class="ph ph-wheelchair"></i>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                        <h4 class="font-semibold text-gray-700 mb-4">สัดส่วนผู้ป่วยตามระดับ ADL</h4>
                        <div class="h-64 flex justify-center">
                            ${totalPatients === 0 ? '<p class="text-gray-400 mt-20">รอข้อมูล...</p>' : '<canvas id="adlChart"></canvas>'}
                        </div>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                        <h4 class="font-semibold text-gray-700 mb-4">แนวโน้มอาการเฉลี่ย (7 วันล่าสุด)</h4>
                        <div class="h-64"><canvas id="symptomChart"></canvas></div>
                    </div>
                </div>
            `;

            // Draw Charts after DOM update
            setTimeout(() => {
                if(totalPatients > 0) {
                    new Chart(document.getElementById('adlChart'), {
                        type: 'doughnut',
                        data: {
                            labels: ['พึ่งพิงสมบูรณ์', 'พึ่งพิงบางส่วน', 'ช่วยเหลือตัวเองได้'],
                            datasets: [{
                                data: [adlCounts['พึ่งพิงสมบูรณ์'], adlCounts['พึ่งพิงบางส่วน'], adlCounts['ช่วยเหลือตัวเองได้']],
                                backgroundColor: ['#f97316', '#eab308', '#22c55e']
                            }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
                    });
                }

                // Average Symptoms (Using static demo values or can be calculated from state.dailyRecords in future)
                new Chart(document.getElementById('symptomChart'), {
                    type: 'bar',
                    data: {
                        labels: ['ปวด (Pain)', 'เหนื่อย (Dyspnea)', 'ซึมเศร้า (Depression)', 'ท้องผูก (Constipation)'],
                        datasets: [{
                            label: 'คะแนนความรุนแรงเฉลี่ย (0-10)',
                            data: [3.5, 2.0, 1.5, 4.2], // Demo avg data
                            backgroundColor: ['#ef4444', '#3b82f6', '#64748b', '#a855f7']
                        }]
                    },
                    options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, max: 10 } } }
                });
            }, 100);
        }

        // 2. PATIENT LIST
        function renderPatients(container) {
            let trs = state.patients.map(p => {
                let dnrBadge = p.polst && p.polst.includes('DNR') 
                    ? `<span class="px-2 py-1 bg-red-100 text-red-700 text-xs rounded-md font-medium">DNR</span>` 
                    : `<span class="px-2 py-1 bg-green-100 text-green-700 text-xs rounded-md font-medium">Full Code</span>`;
                
                return `
                    <tr class="border-b border-gray-50 hover:bg-gray-50 transition-colors">
                        <td class="py-4 px-4 text-sm text-gray-600">${p.hn || '-'}</td>
                        <td class="py-4 px-4 font-medium text-gray-800">${p.name || '-'}</td>
                        <td class="py-4 px-4 text-sm text-gray-600">${p.age || '-'} / ${p.gender || '-'}</td>
                        <td class="py-4 px-4 text-sm text-gray-600">${p.diagnosis || '-'}</td>
                        <td class="py-4 px-4 text-sm text-gray-600">${p.adlScore || '-'}</td>
                        <td class="py-4 px-4">${dnrBadge}</td>
                        <td class="py-4 px-4 flex gap-2">
                            <button onclick="navigate('patient-detail', {patientId: '${p.id}'})" class="px-3 py-1.5 bg-sky-100 text-sky-700 rounded-lg text-sm hover:bg-sky-200 transition">รายละเอียด</button>
                            <button onclick="navigate('add-patient', {patientId: '${p.id}'})" class="px-3 py-1.5 bg-gray-100 text-gray-700 rounded-lg text-sm hover:bg-gray-200 transition"><i class="ph ph-pencil-simple"></i></button>
                        </td>
                    </tr>
                `;
            }).join('');

            container.innerHTML = `
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden flex flex-col h-full">
                    <div class="p-4 border-b border-gray-100 flex flex-wrap justify-between items-center gap-4">
                        <div class="relative max-w-sm w-full">
                            <i class="ph ph-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                            <input type="text" id="patient-search-input" oninput="handleSearch(this.value)" placeholder="ค้นหา HN, ชื่อ, โรค..." class="w-full pl-10 pr-4 py-2 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500 transition">
                        </div>
                        <button onclick="exportAllToExcel()" class="flex items-center gap-2 px-4 py-2 bg-green-50 text-green-700 rounded-lg font-medium hover:bg-green-100 transition border border-green-200">
                            <i class="ph ph-file-xls text-lg"></i> ส่งออก Excel ทั้งหมด
                        </button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-gray-50 text-gray-500 text-sm border-b border-gray-100">
                                    <th class="py-3 px-4 font-medium">HN</th>
                                    <th class="py-3 px-4 font-medium">ชื่อ-สกุล</th>
                                    <th class="py-3 px-4 font-medium">อายุ/เพศ</th>
                                    <th class="py-3 px-4 font-medium">การวินิจฉัย (Dx)</th>
                                    <th class="py-3 px-4 font-medium">ระดับ ADL</th>
                                    <th class="py-3 px-4 font-medium">สถานะกู้ชีพ</th>
                                    <th class="py-3 px-4 font-medium">จัดการ</th>
                                </tr>
                            </thead>
                            <tbody id="patient-table-body">${trs}</tbody>
                        </table>
                        <div id="no-patients-alert" class="${state.patients.length === 0 ? '' : 'hidden'} text-center py-8 text-gray-500">ไม่มีข้อมูลผู้ป่วย</div>
                    </div>
                </div>
            `;
        }

        window.handleSearch = function(query) {
            const filtered = state.patients.filter(p => 
                (p.hn && p.hn.toLowerCase().includes(query.toLowerCase())) ||
                (p.name && p.name.toLowerCase().includes(query.toLowerCase())) ||
                (p.diagnosis && p.diagnosis.toLowerCase().includes(query.toLowerCase())) ||
                (p.underlyingDiseases && p.underlyingDiseases.toLowerCase().includes(query.toLowerCase()))
            );

            const tbody = document.getElementById('patient-table-body');
            const alertDiv = document.getElementById('no-patients-alert');

            if(filtered.length === 0) {
                tbody.innerHTML = '';
                alertDiv.classList.remove('hidden');
            } else {
                alertDiv.classList.add('hidden');
                tbody.innerHTML = filtered.map(p => {
                    let dnrBadge = p.polst && p.polst.includes('DNR') 
                        ? `<span class="px-2 py-1 bg-red-100 text-red-700 text-xs rounded-md font-medium">DNR</span>` 
                        : `<span class="px-2 py-1 bg-green-100 text-green-700 text-xs rounded-md font-medium">Full Code</span>`;
                    
                    return `
                        <tr class="border-b border-gray-50 hover:bg-gray-50 transition-colors">
                            <td class="py-4 px-4 text-sm text-gray-600">${p.hn}</td>
                            <td class="py-4 px-4 font-medium text-gray-800">${p.name}</td>
                            <td class="py-4 px-4 text-sm text-gray-600">${p.age} / ${p.gender}</td>
                            <td class="py-4 px-4 text-sm text-gray-600">${p.diagnosis || '-'}</td>
                            <td class="py-4 px-4 text-sm text-gray-600">${p.adlScore}</td>
                            <td class="py-4 px-4">${dnrBadge}</td>
                            <td class="py-4 px-4 flex gap-2">
                                <button onclick="navigate('patient-detail', {patientId: '${p.id}'})" class="px-3 py-1.5 bg-sky-100 text-sky-700 rounded-lg text-sm hover:bg-sky-200 transition">รายละเอียด</button>
                                <button onclick="navigate('add-patient', {patientId: '${p.id}'})" class="px-3 py-1.5 bg-gray-100 text-gray-700 rounded-lg text-sm hover:bg-gray-200 transition"><i class="ph ph-pencil-simple"></i></button>
                            </td>
                        </tr>
                    `;
                }).join('');
            }
        };

        // 3. ADD/EDIT PATIENT FORM
        function renderPatientForm(container) {
            const p = state.selectedPatientId ? state.patients.find(x => x.id === state.selectedPatientId) : {};
            const isEdit = !!state.selectedPatientId;

            container.innerHTML = `
                <div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-sm border border-gray-100 p-6 md:p-8">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-lg font-bold text-gray-800">${isEdit ? 'แก้ไขข้อมูลผู้ป่วย: '+p.name : 'ลงทะเบียนผู้ป่วยใหม่'}</h3>
                        ${isEdit ? `<button onclick="navigate('patient-detail', {patientId: '${p.id}'})" class="text-sky-600 text-sm hover:underline">ยกเลิก/กลับไปหน้ารายละเอียด</button>` : ''}
                    </div>

                    <form id="patientForm" onsubmit="handleSavePatient(event)" class="space-y-8">
                        <input type="hidden" id="f_id" value="${p.id || ''}">
                        
                        <!-- Section 1: ข้อมูลทั่วไป -->
                        <section>
                            <h4 class="font-medium text-gray-700 border-b pb-2 mb-4">1. ข้อมูลทั่วไป (General Info)</h4>
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                                <div>
                                    <label class="block text-sm text-gray-600 mb-1">HN</label>
                                    <input type="text" id="f_hn" value="${p.hn || ''}" class="w-full px-3 py-2 border rounded-lg focus:ring-sky-500 focus:border-sky-500" required>
                                </div>
                                <div class="md:col-span-2">
                                    <label class="block text-sm text-gray-600 mb-1">ชื่อ-สกุล</label>
                                    <input type="text" id="f_name" value="${p.name || ''}" class="w-full px-3 py-2 border rounded-lg focus:ring-sky-500" required>
                                </div>
                                <div>
                                    <label class="block text-sm text-gray-600 mb-1">อายุ (ปี)</label>
                                    <input type="number" id="f_age" value="${p.age || ''}" class="w-full px-3 py-2 border rounded-lg focus:ring-sky-500">
                                </div>
                                <div>
                                    <label class="block text-sm text-gray-600 mb-1">เพศ</label>
                                    <select id="f_gender" class="w-full px-3 py-2 border rounded-lg focus:ring-sky-500">
                                        <option value="ชาย" ${p.gender==='ชาย'?'selected':''}>ชาย</option>
                                        <option value="หญิง" ${p.gender==='หญิง'?'selected':''}>หญิง</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-sm text-gray-600 mb-1">สิทธิ์การรักษา</label>
                                    <input type="text" id="f_insurance" value="${p.insurance || ''}" class="w-full px-3 py-2 border rounded-lg focus:ring-sky-500">
                                </div>
                                <div>
                                    <label class="block text-sm text-gray-600 mb-1">วันที่เข้ารับการดูแล</label>

        // --- HANDLERS FOR DYNAMIC MEDICATIONS ---
        window.renderTempMedications = function() {
            const container = document.getElementById('temp-meds-list');
            if(!container) return;
            container.innerHTML = window.tempMedications.map((m, idx) => `
                <div class="flex justify-between items-center bg-sky-50 text-sky-900 px-3 py-2 rounded-lg text-sm border border-sky-100">
                    <div>
                        <span class="font-semibold text-sky-800">${m.name}</span>
                        <span class="text-xs text-sky-600 ml-3">ขนาด: ${m.dosage} | วิธีใช้: ${m.frequency}</span>
                    </div>
                    <button type="button" onclick="window.removeTempMedication(${idx})" class="text-rose-500 hover:text-rose-700 font-medium text-xs">ลบ</button>
                </div>
            `).join('') || '<p class="text-gray-400 text-xs py-2 text-center">ยังไม่มีข้อมูลยาประจำตัว</p>';
        };

        window.handleAddMedication = function() {
            const name = document.getElementById('add_med_name').value.trim();
            const dosage = document.getElementById('add_med_dose').value.trim();
            const frequency = document.getElementById('add_med_freq').value.trim();

            if(!name) { alert('กรุณากรอกชื่อยา'); return; }

            window.tempMedications.push({ name, dosage, frequency });
            document.getElementById('add_med_name').value = '';
            document.getElementById('add_med_dose').value = '';
            document.getElementById('add_med_freq').value = '';

            window.renderTempMedications();
        };

        window.removeTempMedication = function(idx) {
            window.tempMedications.splice(idx, 1);
            window.renderTempMedications();
        };

        // --- HANDLERS FOR DYNAMIC BLOOD TESTS ---
        window.renderTempBloodTests = function() {
            const container = document.getElementById('temp-blood-list');
            if(!container) return;
            container.innerHTML = window.tempBloodTests.map((b, idx) => `
                <tr class="border-b border-gray-200">
                    <td class="p-2 font-medium">${b.year}</td>
                    <td class="p-2">${b.fbs || '-'}</td>
                    <td class="p-2">${b.hba1c ? b.hba1c + '%' : '-'}</td>
                    <td class="p-2">${b.egfr || '-'}</td>
                    <td class="p-2">${b.chol || '-'}</td>
                    <td class="p-2">${b.hdl || '-'}</td>
                    <td class="p-2">${b.ldl || '-'}</td>
                    <td class="p-2">${b.tg || '-'}</td>
                    <td class="p-2">
                        <button type="button" onclick="window.removeTempBloodTest(${idx})" class="text-rose-500 hover:text-rose-700 font-medium">ลบ</button>
                    </td>
                </tr>
            `).join('') || '<tr><td colspan="9" class="text-center py-4 text-gray-400">ยังไม่มีประวัติบันทึกตรวจเลือด</td></tr>';
        };

        window.handleAddBloodTest = function() {
            const yearInput = document.getElementById('add_blood_year');
            const fbsInput = document.getElementById('add_blood_fbs');
            const hba1cInput = document.getElementById('add_blood_hba1c');
            const egfrInput = document.getElementById('add_blood_egfr');
            const cholInput = document.getElementById('add_blood_chol');
            const hdlInput = document.getElementById('add_blood_hdl');
            const ldlInput = document.getElementById('add_blood_ldl');
            const tgInput = document.getElementById('add_blood_tg');

            const year = parseInt(yearInput.value) || new Date().getFullYear() + 543;
            const fbs = parseInt(fbsInput.value) || null;
            const hba1c = parseFloat(hba1cInput.value) || null;
            const egfr = parseFloat(egfrInput.value) || null;
            const chol = parseInt(cholInput.value) || null;
            const hdl = parseInt(hdlInput.value) || null;
            const ldl = parseInt(ldlInput.value) || null;
            const tg = parseInt(tgInput.value) || null;

            window.tempBloodTests.push({ year, fbs, hba1c, egfr, chol, hdl, ldl, tg });
            
            // Clear inputs
            fbsInput.value = '';
            hba1cInput.value = '';
            egfrInput.value = '';
            cholInput.value = '';
            hdlInput.value = '';
            ldlInput.value = '';
            tgInput.value = '';

            window.renderTempBloodTests();
        };

        window.removeTempBloodTest = function(idx) {
            window.tempBloodTests.splice(idx, 1);
            window.renderTempBloodTests();
        };

        // --- SAVE MAIN FORM TO SUPABASE ---
        window.handleSavePatient = async function(e) {
            e.preventDefault();
            const idInput = document.getElementById('f_id').value;
            // สร้าง ID ใหม่ถ้าเป็นการเพิ่มผู้ป่วยใหม่
            const newId = idInput ? idInput : 'P' + Math.floor(Math.random() * 10000).toString().padStart(4, '0');

            const newData = {
                id: newId,
                hn: document.getElementById('f_hn').value,
                name: document.getElementById('f_name').value,
                age: parseInt(document.getElementById('f_age').value) || null,
                gender: document.getElementById('f_gender').value,
                insurance: document.getElementById('f_insurance').value,
                admissionDate: document.getElementById('f_admission').value,
                patientType: document.getElementById('f_type').value,
                adlScore: document.getElementById('f_adl').value,
                relativeName: document.getElementById('f_relativeName').value,
                relativeRelation: document.getElementById('f_relativeRelation').value,
                relativePhone: document.getElementById('f_relativePhone').value,
                diagnosis: document.getElementById('f_dx').value,
                underlyingDiseases: document.getElementById('f_underlying').value,
                medReconcile: document.getElementById('f_medReconcile').value,
                polst: document.getElementById('f_polst').value,
                acp: document.getElementById('f_acp').value,
                medicationsList: [...window.tempMedications], // บันทึกเป็น jsonb
                bloodTestsList: [...window.tempBloodTests]    // บันทึกเป็น jsonb
            };

            try {
                // บันทึกลง Supabase
                const { error } = await supabaseClient.from('patients').upsert(newData);
                if (error) throw error;

                alert('บันทึกข้อมูลผู้ป่วยสำเร็จ!');
                await fetchInitialData(); // รีเฟรชข้อมูลใหม่
                navigate('patients');
            } catch (error) {
                console.error('Error saving patient:', error);
                alert('เกิดข้อผิดพลาดในการบันทึกข้อมูล: ' + error.message);
            }
        };

        window.exportPatientData = function(patientId) {

            // Sheet 1: ข้อมูลผู้ป่วย

                'HN': p.hn, 'ชื่อ-สกุล': p.name, 'อายุ': p.age, 'เพศ': p.gender,

            const wsInfo = XLSX.utils.json_to_sheet(infoData);

            // Sheet 3: ผลเลือดประจำปี

                'ปี พ.ศ.': b.year,

                'eGFR (mL/min/1.73 m2)': b.egfr,

                'LDL (mg/dL)': b.ldl,
                'Triglyceride (mg/dL)': b.tg
            }));
            const wsBlood = XLSX.utils.json_to_sheet(bloodTestData);

            // Sheet 4: บันทึกอาการ
            const recordData = records.map(r => ({
                'วันที่': r.date,
                'BP': r.bp, 'HR': r.hr, 'RR': r.rr, 'Temp': r.temp, 'SpO2': r.o2,

            }));
            const wsRecords = XLSX.utils.json_to_sheet(recordData);

            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, wsInfo, "ข้อมูลทั่วไป");
            if(medicationsData.length > 0) XLSX.utils.book_append_sheet(wb, wsMeds, "ยาประจำตัว");
            if(bloodTestData.length > 0) XLSX.utils.book_append_sheet(wb, wsBlood, "ผลเลือดประจำปี");
            if(recordData.length > 0) XLSX.utils.book_append_sheet(wb, wsRecords, "บันทึกอาการรายวัน");
            
            XLSX.writeFile(wb, `Patient_Data_${p.hn}.xlsx`);
        };

        // --- INIT ---
        window.onload = () => {
            navigate('dashboard');
            // ทำการดึงข้อมูลจาก Supabase ทันทีที่เปิดเว็บ
            fetchInitialData();
        };
    </script>
</body>
