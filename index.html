<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการสถานชีวาภิบาล วัดทับคล้อ (Supabase)</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- SheetJS (Excel Export) -->
    <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- html2pdf.js for PDF Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Prompt', sans-serif; background-color: #f3f4f6; }

        .tab-inactive { color: #6b7280; }
        .tab-inactive:hover { color: #374151; }
        
        /* Hide scrollbar for clean UI but keep functionality */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="text-gray-800 h-screen flex overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-64 bg-white shadow-md flex-shrink-0 flex flex-col z-10 transition-all duration-300">

            <div>
                <h1 class="font-bold text-lg leading-tight text-gray-800">สถานชีวาภิบาล</h1>
                <p class="text-xs text-gray-500">วัดทับคล้อ</p>
            </div>
        </div>
        <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
            <button onclick="navigate('dashboard')" id="nav-dashboard" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left transition-colors text-gray-600 hover:bg-sky-50 hover:text-sky-600">
                <i class="ph ph-squares-four text-xl"></i>
                <span>แดชบอร์ด</span>
            </button>
            <button onclick="navigate('patients')" id="nav-patients" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left transition-colors text-gray-600 hover:bg-sky-50 hover:text-sky-600">
                <i class="ph ph-users text-xl"></i>
                <span>รายชื่อผู้ป่วยปัจจุบัน</span>
            </button>
            <button onclick="navigate('discharged')" id="nav-discharged" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left transition-colors text-gray-600 hover:bg-rose-50 hover:text-rose-600">
                <i class="ph ph-user-minus text-xl"></i>
                <span>ประวัติผู้ป่วย Discharge</span>
            </button>
            <button onclick="navigate('add-patient')" id="nav-add-patient" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left transition-colors text-gray-600 hover:bg-sky-50 hover:text-sky-600">
                <i class="ph ph-user-plus text-xl"></i>
                <span>ลงทะเบียนผู้ป่วยใหม่</span>
            </button>
        </nav>
        <div class="p-4 border-t border-gray-100 text-xs text-green-600 font-medium text-center bg-green-50">
            <i class="ph ph-cloud-check"></i> Connected to Supabase
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-screen overflow-hidden bg-gray-50">
        <!-- Header -->
        <header class="bg-white shadow-sm px-8 py-4 flex justify-between items-center z-0">
            <h2 id="page-title" class="text-xl font-semibold text-gray-700">แดชบอร์ด</h2>
            <div class="flex items-center gap-4">
                <span class="text-sm text-gray-500"><i class="ph ph-clock mr-1"></i> <span id="current-date"></span></span>
                <div class="h-8 w-8 rounded-full bg-sky-100 text-sky-600 flex items-center justify-center font-bold">
                    จน
                </div>
            </div>
        </header>

        <!-- Dynamic Content Area -->
        <div id="app-content" class="flex-1 overflow-y-auto p-4 md:p-8">
            <!-- Content gets injected here by JS -->
        </div>
    </main>

    <script>
        // --- SUPABASE SETUP ---
        const SUPABASE_URL = 'https://hompmaasqrbuwxejswun.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhvbXBtYWFzcXJidXd4ZWpzd3VuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzMjY5NTAsImV4cCI6MjA5NTkwMjk1MH0.QvnuDBUU5g_EZtE3Vkc_1hc7xXmZlvrIR0eFRGqpaQM';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // --- DATA & STATE MANAGEMENT ---
        const state = {
            currentView: 'dashboard',
            patients: [],
            dailyRecords: [],
            selectedPatientId: null,
            detailTab: 'info' // info, medical, records
        };

        window.tempMedications = [];
        window.tempBloodTests = [];
        window.editingRecordId = null; // เก็บไอดีบันทึกรายวันที่ต้องการแก้ไข

        // --- FETCH DATA FROM SUPABASE ---
        async function fetchInitialData() {
            try {
                // ดึงข้อมูลผู้ป่วย
                const { data: patientsData, error: err1 } = await supabaseClient.from('patients').select('*');
                if (err1) throw err1;
                state.patients = patientsData || [];

                // ดึงข้อมูลบันทึกรายวัน
                const { data: recordsData, error: err2 } = await supabaseClient.from('daily_records').select('*');
                if (err2) throw err2;
                state.dailyRecords = recordsData || [];

                render();
            } catch (error) {
                console.error('Error fetching data:', error);
                alert('ไม่สามารถดึงข้อมูลจาก Supabase ได้ กรุณาตรวจสอบ RLS ใน Supabase');
            }
        }

        // --- UTILITIES ---
        const formatDate = (dateStr) => {
            if(!dateStr) return '-';
            const d = new Date(dateStr);
            return d.toLocaleDateString('th-TH', { year: 'numeric', month: 'short', day: 'numeric' });
        };

        const parseBP = (bpStr) => {
            if(!bpStr || !bpStr.includes('/')) return { sys: null, dia: null };
            const parts = bpStr.split('/');
            return {
                sys: parseInt(parts[0]) || null,
                dia: parseInt(parts[1]) || null
            };
        };

        // ฟังก์ชันช่วยแยกและถอดรหัสบันทึก MDT แบบยืดหยุ่นรองรับรูปแบบเดิม
        function parseCompiledMDTNotes(noteStr) {
            let result = { doctor: '', nurse: '', pt: '', other: '' };
            if (!noteStr) return result;
            
            try {
                // เผื่อจัดเก็บเป็นรูปแบบ JSON ในอนาคต
                const parsed = JSON.parse(noteStr);
                if (parsed && (parsed.doctor || parsed.nurse || parsed.pt || parsed.other)) {
                    return {
                        doctor: parsed.doctor || '',
                        nurse: parsed.nurse || '',
                        pt: parsed.pt || '',
                        other: parsed.other || ''
                    };
                }
            } catch(e) {}
            
            // ใช้ Regex ในการแปลงรูปแบบ [แพทย์]: ... 
            const docMatch = noteStr.match(/\[แพทย์\]:\s*([\s\S]*?)(?=\[|$)/);
            const nurseMatch = noteStr.match(/\[พยาบาล\]:\s*([\s\S]*?)(?=\[|$)/);
            const ptMatch = noteStr.match(/\[นักกายภาพ\]:\s*([\s\S]*?)(?=\[|$)/);
            const otherMatch = noteStr.match(/\[อื่นๆ\]:\s*([\s\S]*?)(?=\[|$)/);
            
            result.doctor = docMatch ? docMatch[1].trim() : '';
            result.nurse = nurseMatch ? nurseMatch[1].trim() : '';
            result.pt = ptMatch ? ptMatch[1].trim() : '';
            result.other = otherMatch ? otherMatch[1].trim() : '';
            
            // กรณีเป็นของเดิมทั้งหมดที่ไม่ได้กรอกแยกวิชาชีพ ให้ไปแสดงในช่อง "สหสาขาวิชาชีพอื่นๆ"
            if (!result.doctor && !result.nurse && !result.pt && !result.other) {
                result.other = noteStr;
            }
            return result;
        }

        document.getElementById('current-date').innerText = new Date().toLocaleDateString('th-TH', { year: 'numeric', month: 'long', day: 'numeric' });

        // --- ROUTING ---
        function navigate(view, params = {}) {
            state.currentView = view;
            
            // สำคัญ: รีเซ็ตค่า patientId ทุกครั้งที่มีการนำทาง เพื่อป้องกันการบันทึกทับ (Edit mode ค้าง)
            if(params.patientId) {
                state.selectedPatientId = params.patientId;
            } else {
                state.selectedPatientId = null;
            }

            if(params.tab) state.detailTab = params.tab;
            
            if (view === 'add-patient') {
                const p = state.selectedPatientId ? state.patients.find(x => x.id === state.selectedPatientId) : {};
                window.tempMedications = p.medicationsList ? JSON.parse(JSON.stringify(p.medicationsList)) : [];
                window.tempBloodTests = p.bloodTestsList ? JSON.parse(JSON.stringify(p.bloodTestsList)) : [];
            }
            
            document.querySelectorAll('nav button').forEach(btn => {
                btn.classList.remove('bg-sky-100', 'text-sky-700', 'font-medium', 'bg-rose-100', 'text-rose-700');
                btn.classList.add('text-gray-600');
            });
            
            const activeNavId = `nav-${view === 'patient-detail' ? 'patients' : (view === 'discharged' ? 'discharged' : view)}`;
            const activeBtn = document.getElementById(activeNavId);
            if(activeBtn) {
                activeBtn.classList.remove('text-gray-600');
                if (view === 'discharged') {
                    activeBtn.classList.add('bg-rose-100', 'text-rose-700', 'font-medium');
                } else {
                    activeBtn.classList.add('bg-sky-100', 'text-sky-700', 'font-medium');
                }
            }

            const titles = {
                'dashboard': 'แดชบอร์ดสรุปข้อมูล',
                'patients': 'ระบบจัดการรายชื่อผู้ป่วยปัจจุบัน',
                'discharged': 'ประวัติผู้ป่วยที่จำหน่ายแล้ว (Discharge Logs)',
                'add-patient': 'ลงทะเบียน/แก้ไขข้อมูลผู้ป่วย',
                'patient-detail': 'รายละเอียดผู้ป่วย'
            };
            document.getElementById('page-title').innerText = titles[view] || 'ระบบจัดการสถานชีวาภิบาล';

            render();
        }

        function render() {
            const content = document.getElementById('app-content');
            content.innerHTML = '';

            switch(state.currentView) {
                case 'dashboard': renderDashboard(content); break;
                case 'patients': renderPatients(content, 'active'); break;
                case 'discharged': renderPatients(content, 'discharged'); break;
                case 'add-patient': renderPatientForm(content); break;
                case 'patient-detail': renderPatientDetail(content); break;
            }
        }

        // 1. DASHBOARD
        function renderDashboard(container) {
            const activePatients = state.patients.filter(p => p.status !== 'Discharged');
            const totalPatients = activePatients.length;
            const palliativeCount = activePatients.filter(p => p.patientType && p.patientType.includes('Palliative')).length;
            const imcCount = activePatients.filter(p => p.patientType && p.patientType.includes('Intermediate')).length;
            
            let adlCounts = { 'พึ่งพิงสมบูรณ์': 0, 'พึ่งพิงบางส่วน': 0, 'ช่วยเหลือตัวเองได้': 0 };
            activePatients.forEach(p => {
                if(p.adlScore && p.adlScore.includes('สมบูรณ์')) adlCounts['พึ่งพิงสมบูรณ์']++;
                else if(p.adlScore && p.adlScore.includes('บางส่วน')) adlCounts['พึ่งพิงบางส่วน']++;
                else adlCounts['ช่วยเหลือตัวเองได้']++;
            });

            container.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex items-center justify-between">
                        <div>
                            <p class="text-gray-500 text-sm">ผู้ป่วยทั้งหมด</p>
                            <h3 class="text-3xl font-bold text-gray-800">${totalPatients} <span class="text-base font-normal">คน</span></h3>
                        </div>
                        <div class="h-12 w-12 rounded-full bg-blue-50 flex items-center justify-center text-blue-500 text-2xl">
                            <i class="ph ph-users"></i>
                        </div>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex items-center justify-between">
                        <div>
                            <p class="text-gray-500 text-sm">ผู้ป่วย Palliative Care</p>
                            <h3 class="text-3xl font-bold text-rose-600">${palliativeCount} <span class="text-base font-normal">คน</span></h3>
                        </div>
                        <div class="h-12 w-12 rounded-full bg-rose-50 flex items-center justify-center text-rose-500 text-2xl">
                            <i class="ph ph-heartbeat"></i>
                        </div>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex items-center justify-between">
                        <div>
                            <p class="text-gray-500 text-sm">ผู้ป่วยกึ่งเฉียบพลัน IMC</p>
                            <h3 class="text-3xl font-bold text-teal-600">${imcCount} <span class="text-base font-normal">คน</span></h3>
                        </div>
                        <div class="h-12 w-12 rounded-full bg-teal-50 flex items-center justify-center text-teal-500 text-2xl">
                            <i class="ph ph-activity"></i>
                        </div>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex items-center justify-between">
                        <div>
                            <p class="text-gray-500 text-sm">พึ่งพิงสมบูรณ์</p>
                            <h3 class="text-3xl font-bold text-orange-500">${adlCounts['พึ่งพิงสมบูรณ์']} <span class="text-base font-normal">คน</span></h3>
                        </div>
                        <div class="h-12 w-12 rounded-full bg-orange-50 flex items-center justify-center text-orange-500 text-2xl">
                            <i class="ph ph-wheelchair"></i>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                        <h4 class="font-semibold text-gray-700 mb-4">สัดส่วนผู้ป่วยตามระดับ ADL (ผู้ป่วยปัจจุบัน)</h4>
                        <div class="h-64 flex justify-center">
                            ${totalPatients === 0 ? '<p class="text-gray-400 mt-20">ยังไม่มีข้อมูลผู้ป่วยปัจจุบัน</p>' : '<canvas id="adlChart"></canvas>'}
                        </div>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                        <h4 class="font-semibold text-gray-700 mb-4">แนวโน้มอาการเฉลี่ย (7 วันล่าสุด)</h4>
                        <div class="h-64"><canvas id="symptomChart"></canvas></div>
                    </div>
                </div>
            `;

            setTimeout(() => {
                if(totalPatients > 0) {
                    new Chart(document.getElementById('adlChart'), {
                        type: 'doughnut',
                        data: {
                            labels: ['พึ่งพิงสมบูรณ์', 'พึ่งพิงบางส่วน', 'ช่วยเหลือตัวเองได้'],
                            datasets: [{
                                data: [adlCounts['พึ่งพิงสมบูรณ์'], adlCounts['พึ่งพิงบางส่วน'], adlCounts['ช่วยเหลือตัวเองได้']],
                                backgroundColor: ['#f97316', '#eab308', '#22c55e']
                            }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
                    });
                }

                new Chart(document.getElementById('symptomChart'), {
                    type: 'bar',
                    data: {
                        labels: ['ปวด (Pain)', 'เหนื่อย (Dyspnea)', 'ซึมเศร้า (Depression)', 'ท้องผูก (Constipation)'],
                        datasets: [{
                            label: 'คะแนนความรุนแรงเฉลี่ย (0-10)',
                            data: [3.1, 2.4, 1.8, 3.5],
                            backgroundColor: ['#ef4444', '#3b82f6', '#64748b', '#a855f7']
                        }]
                    },
                    options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, max: 10 } } }
                });
            }, 100);
        }

        // 2. PATIENT LIST (Active & Discharged)
        function renderPatients(container, filterType = 'active') {
            const list = state.patients.filter(p => {
                if (filterType === 'discharged') return p.status === 'Discharged';
                return p.status !== 'Discharged';
            });

            let trs = list.map(p => {
                let dnrBadge = p.polst && p.polst.includes('DNR') 
                    ? `<span class="px-2 py-1 bg-red-100 text-red-700 text-xs rounded-md font-medium">DNR</span>` 
                    : `<span class="px-2 py-1 bg-green-100 text-green-700 text-xs rounded-md font-medium">Full Code</span>`;
                
                return `
                    <tr class="border-b border-gray-50 hover:bg-gray-50 transition-colors">
                        <td class="py-4 px-4 text-sm text-gray-600">${p.hn || '-'}</td>
                        <td class="py-4 px-4 font-medium text-gray-800">${p.name || '-'}</td>
                        <td class="py-4 px-4 text-sm text-gray-600">${p.age || '-'} / ${p.gender || '-'}</td>
                        <td class="py-4 px-4 text-sm text-gray-600">${p.diagnosis || '-'}</td>
                        <td class="py-4 px-4 text-sm text-gray-600">${p.adlScore || '-'}</td>
                        <td class="py-4 px-4">${dnrBadge}</td>
                        <td class="py-4 px-4 flex gap-2">
                            <button onclick="navigate('patient-detail', {patientId: '${p.id}'})" class="px-3 py-1.5 bg-sky-100 text-sky-700 rounded-lg text-sm hover:bg-sky-200 transition font-medium">ดูรายละเอียด</button>
                            <button onclick="navigate('add-patient', {patientId: '${p.id}'})" class="px-3 py-1.5 bg-gray-100 text-gray-700 rounded-lg text-sm hover:bg-gray-200 transition"><i class="ph ph-pencil-simple"></i></button>
                        </td>
                    </tr>
                `;
            }).join('');

            container.innerHTML = `
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden flex flex-col h-full">
                    <div class="p-4 border-b border-gray-100 flex flex-wrap justify-between items-center gap-4">
                        <div class="relative max-w-sm w-full">
                            <i class="ph ph-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                            <input type="text" id="patient-search-input" oninput="handleSearch(this.value, '${filterType}')" placeholder="ค้นหา HN, ชื่อ, โรค..." class="w-full pl-10 pr-4 py-2 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500 transition">
                        </div>
                        <button onclick="exportAllToExcel('${filterType}')" class="flex items-center gap-2 px-4 py-2 bg-green-50 text-green-700 rounded-lg font-medium hover:bg-green-100 transition border border-green-200">
                            <i class="ph ph-file-xls text-lg"></i> ส่งออก Excel ทั้งหมด
                        </button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-gray-50 text-gray-500 text-sm border-b border-gray-100">
                                    <th class="py-3 px-4 font-medium">HN</th>
                                    <th class="py-3 px-4 font-medium">ชื่อ-สกุล</th>
                                    <th class="py-3 px-4 font-medium">อายุ/เพศ</th>
                                    <th class="py-3 px-4 font-medium">การวินิจฉัย (Dx)</th>
                                    <th class="py-3 px-4 font-medium">ระดับ ADL</th>
                                    <th class="py-3 px-4 font-medium">สถานะกู้ชีพ</th>
                                    <th class="py-3 px-4 font-medium">จัดการ</th>
                                </tr>
                            </thead>
                            <tbody id="patient-table-body">${trs}</tbody>
                        </table>
                        <div id="no-patients-alert" class="${list.length === 0 ? '' : 'hidden'} text-center py-12 text-gray-400">ไม่มีข้อมูลผู้ป่วยที่เลือก</div>
                    </div>
                </div>
            `;
        }

        window.handleSearch = function(query, filterType) {
            const list = state.patients.filter(p => {
                if (filterType === 'discharged') return p.status === 'Discharged';
                return p.status !== 'Discharged';
            });

            const filtered = list.filter(p => 
                (p.hn && p.hn.toLowerCase().includes(query.toLowerCase())) ||
                (p.name && p.name.toLowerCase().includes(query.toLowerCase())) ||
                (p.diagnosis && p.diagnosis.toLowerCase().includes(query.toLowerCase())) ||
                (p.underlyingDiseases && p.underlyingDiseases.toLowerCase().includes(query.toLowerCase()))
            );

            const tbody = document.getElementById('patient-table-body');
            const alertDiv = document.getElementById('no-patients-alert');

            if(filtered.length === 0) {
                tbody.innerHTML = '';
                alertDiv.classList.remove('hidden');
            } else {
                alertDiv.classList.add('hidden');
                tbody.innerHTML = filtered.map(p => {
                    let dnrBadge = p.polst && p.polst.includes('DNR') 
                        ? `<span class="px-2 py-1 bg-red-100 text-red-700 text-xs rounded-md font-medium">DNR</span>` 
                        : `<span class="px-2 py-1 bg-green-100 text-green-700 text-xs rounded-md font-medium">Full Code</span>`;
                    
                    return `
                        <tr class="border-b border-gray-50 hover:bg-gray-50 transition-colors">

        // --- HANDLERS FOR DYNAMIC MEDICATIONS ---
        window.renderTempMedications = function() {
            const container = document.getElementById('temp-meds-list');
            if(!container) return;
            container.innerHTML = window.tempMedications.map((m, idx) => `
                <div class="flex justify-between items-center bg-sky-50 text-sky-900 px-3 py-2 rounded-lg text-sm border border-sky-100">
                    <div>
                        <span class="font-semibold text-sky-800">${m.name}</span>
                        <span class="text-xs text-sky-600 ml-3">ขนาด: ${m.dosage} | วิธีใช้: ${m.frequency}</span>
                    </div>
                    <button type="button" onclick="window.removeTempMedication(${idx})" class="text-rose-500 hover:text-rose-700 font-medium text-xs">ลบ</button>
                </div>
            `).join('') || '<p class="text-gray-400 text-xs py-2 text-center">ยังไม่มีข้อมูลยาประจำตัว</p>';
        };

        window.handleAddMedication = function() {
            const name = document.getElementById('add_med_name').value.trim();
            const dosage = document.getElementById('add_med_dose').value.trim();
            const frequency = document.getElementById('add_med_freq').value.trim();

            if(!name) { alert('กรุณากรอกชื่อยา'); return; }

            window.tempMedications.push({ name, dosage, frequency });
            document.getElementById('add_med_name').value = '';
            document.getElementById('add_med_dose').value = '';
            document.getElementById('add_med_freq').value = '';

            window.renderTempMedications();
        };

        window.removeTempMedication = function(idx) {
            window.tempMedications.splice(idx, 1);
            window.renderTempMedications();
        };

        // --- HANDLERS FOR DYNAMIC BLOOD TESTS ---
        window.renderTempBloodTests = function() {
            const container = document.getElementById('temp-blood-list');
            if(!container) return;
            container.innerHTML = window.tempBloodTests.map((b, idx) => `
                <tr class="border-b border-gray-200 text-xs">
                    <td class="p-2 font-medium">${b.year}</td>
                    <td class="p-2">${b.fbs || '-'}</td>
                    <td class="p-2">${b.hba1c ? b.hba1c + '%' : '-'}</td>
                    <td class="p-2">${b.egfr || '-'}</td>
                    <td class="p-2">${b.chol || '-'}</td>
                    <td class="p-2">${b.hdl || '-'}</td>
                    <td class="p-2">${b.ldl || '-'}</td>
                    <td class="p-2">${b.tg || '-'}</td>
                    <td class="p-2">
                        <button type="button" onclick="window.removeTempBloodTest(${idx})" class="text-rose-500 hover:text-rose-700 font-medium">ลบ</button>
                    </td>
                </tr>
            `).join('') || '<tr><td colspan="9" class="text-center py-4 text-gray-400">ยังไม่มีประวัติบันทึกตรวจเลือด</td></tr>';
        };

        window.handleAddBloodTest = function() {
            const yearInput = document.getElementById('add_blood_year');
            const fbsInput = document.getElementById('add_blood_fbs');
            const hba1cInput = document.getElementById('add_blood_hba1c');
            const egfrInput = document.getElementById('add_blood_egfr');
            const cholInput = document.getElementById('add_blood_chol');
            const hdlInput = document.getElementById('add_blood_hdl');
            const ldlInput = document.getElementById('add_blood_ldl');
            const tgInput = document.getElementById('add_blood_tg');

            const year = parseInt(yearInput.value) || new Date().getFullYear() + 543;
            const fbs = parseInt(fbsInput.value) || null;
            const hba1c = parseFloat(hba1cInput.value) || null;
            const egfr = parseFloat(egfrInput.value) || null;
            const chol = parseInt(cholInput.value) || null;
            const hdl = parseInt(hdlInput.value) || null;
            const ldl = parseInt(ldlInput.value) || null;
            const tg = parseInt(tgInput.value) || null;

            window.tempBloodTests.push({ year, fbs, hba1c, egfr, chol, hdl, ldl, tg });
            
            fbsInput.value = '';
            hba1cInput.value = '';
            egfrInput.value = '';
            cholInput.value = '';
            hdlInput.value = '';
            ldlInput.value = '';
            tgInput.value = '';

            window.renderTempBloodTests();
        };

        window.removeTempBloodTest = function(idx) {
            window.tempBloodTests.splice(idx, 1);
            window.renderTempBloodTests();
        };

        // --- SAVE MAIN FORM TO SUPABASE ---
        window.handleSavePatient = async function(e) {
            e.preventDefault();
            const idInput = document.getElementById('f_id').value;
            const newId = idInput ? idInput : 'P' + Math.floor(Math.random() * 10000).toString().padStart(4, '0');

            const oldP = state.patients.find(x => x.id === idInput) || {};

            const newData = {
                id: newId,
                hn: document.getElementById('f_hn').value,
                name: document.getElementById('f_name').value,
                age: parseInt(document.getElementById('f_age').value) || null,
                gender: document.getElementById('f_gender').value,
                insurance: document.getElementById('f_insurance').value,
                admissionDate: document.getElementById('f_admission').value,
                patientType: document.getElementById('f_type').value,
                adlScore: document.getElementById('f_adl').value,
                hospitalHistory: document.getElementById('f_hospitalHistory').value,
                relativeName: document.getElementById('f_relativeName').value,
                relativeRelation: document.getElementById('f_relativeRelation').value,
                relativePhone: document.getElementById('f_relativePhone').value,
                diagnosis: document.getElementById('f_dx').value,

                        status: 'Active',
                        dischargeDate: null,
                        dischargeReason: null,
                        dischargeNote: null
                    })
                    .eq('id', patientId);

                if (error) throw error;

                alert('รับผู้ป่วยรายเดิมกลับเข้ามาดูแลอีกครั้งเรียบร้อย');
                await fetchInitialData();
                navigate('patients');
            } catch (error) {
                console.error('Error re-admit:', error);
                alert('เกิดข้อผิดพลาดในการรับดูแลใหม่: ' + error.message);
            }
        };

        // --- MED ADJUSTMENT DIALOGS ---
        window.openMedicationAdjustmentModal = function() {
            document.getElementById('medAdjModal').classList.remove('hidden');
        };
        window.closeMedicationAdjustmentModal = function() {
            document.getElementById('medAdjModal').classList.add('hidden');
        };
        window.onMedSelectChange = function(patientId) {
            const selectEl = document.getElementById('adj_med_select');
            const selectedOpt = selectEl.options[selectEl.selectedIndex];
            if(selectedOpt && selectedOpt.value) {
                const dosage = selectedOpt.getAttribute('data-dosage') || '';
                const freq = selectedOpt.getAttribute('data-freq') || '';
                document.getElementById('adj_med_from').value = `${dosage} (${freq})`;
            } else {
                document.getElementById('adj_med_from').value = '';
            }
        };

        window.handleSaveMedAdjustment = async function(e, patientId) {
            e.preventDefault();
            const medName = document.getElementById('adj_med_select').value;
            const fromDose = document.getElementById('adj_med_from').value;
            const toDose = document.getElementById('adj_med_to').value;
            const reason = document.getElementById('adj_med_reason').value;
            const physician = document.getElementById('adj_med_physician').value;

            if(!medName) { alert('กรุณาเลือกรายการยาที่จะปรับเปลี่ยน'); return; }

            const p = state.patients.find(x => x.id === patientId);
            if(!p) return;

            const changes = p.medicationChanges || [];
            changes.push({
                date: new Date().toISOString().split('T')[0],
                medName,
                fromDose,
                toDose,
                reason,
                physician
            });

            // อัปเดตขนาดยาจริงในรายการยาของคนไข้ด้วย
            const updatedMeds = (p.medicationsList || []).map(m => {
                if(m.name === medName) {
                    const parts = toDose.split('(');
                    let newD = toDose;
                    let newF = m.frequency;
                    if(parts.length > 1) {
                        newD = parts[0].trim();
                        newF = parts[1].replace(')', '').trim();
                    }
                    return { name: m.name, dosage: newD, frequency: newF };
                }
                return m;
            });

            try {
                const { error } = await supabaseClient
                    .from('patients')
                    .update({
                        medicationChanges: changes,
                        medicationsList: updatedMeds
                    })
                    .eq('id', patientId);

                if (error) throw error;

                alert('บันทึกปรับเปลี่ยนยาเรียบร้อยแล้ว');
                closeMedicationAdjustmentModal();
                await fetchInitialData();
            } catch (error) {
                console.error('Error saving med adj:', error);
                alert('เกิดข้อผิดพลาดในการปรับเปลี่ยนยา: ' + error.message);
            }
        };

        // --- EXPORT PDF ACTION ---
        window.exportToPDF = function(patientId) {
            const p = state.patients.find(x => x.id === patientId);
            if(!p) return;
            
            const element = document.getElementById('pdf-report-template');
            element.classList.remove('hidden');

            const opt = {
                margin:       0,
                filename:     `Summary_Report_${p.hn || p.name}.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(opt).from(element).save().then(() => {
                element.classList.add('hidden');
            });
        };

        // --- DAILY RECORD ACTIONS (ADD / EDIT) ---
        window.openDailyRecordFormForAdd = function() {
            window.editingRecordId = null;
            document.getElementById('dr_modal_title').innerText = "เพิ่มบันทึกอาการประจำวัน";
            document.getElementById('dr_submit_btn').innerText = "บันทึกลง Cloud";
            
            // ล้างค่าในแบบฟอร์ม
            document.getElementById('dr_date').value = new Date().toISOString().split('T')[0];
            document.getElementById('dr_recorder').value = "";
            document.getElementById('dr_bp').value = "";
            document.getElementById('dr_hr').value = "";
            document.getElementById('dr_rr').value = "";
            document.getElementById('dr_temp').value = "";
            document.getElementById('dr_o2').value = "";
            document.getElementById('dr_pain').value = 0;
            document.getElementById('dr_dyspnea').value = 0;
            document.getElementById('dr_dep').value = 0;
            document.getElementById('dr_cons').value = 0;
            
            // ล้างช่องบันทึก MDT
            document.getElementById('dr_note_doctor').value = "";
            document.getElementById('dr_note_nurse').value = "";
            document.getElementById('dr_note_pt').value = "";
            document.getElementById('dr_note_other').value = "";

            document.getElementById('dailyRecordModal').classList.remove('hidden');
        };

        window.openDailyRecordFormForEdit = function(recordId) {
            window.editingRecordId = recordId;
            const rec = state.dailyRecords.find(x => x.id.toString() === recordId.toString());
            if(!rec) return;

            document.getElementById('dr_modal_title').innerText = "แก้ไขบันทึกอาการประจำวัน";
            document.getElementById('dr_submit_btn').innerText = "บันทึกการแก้ไข (Update)";
            
            // โหลดข้อมูลเก่ามาใส่ฟอร์ม
            document.getElementById('dr_date').value = rec.date ? rec.date.split('T')[0] : '';
            document.getElementById('dr_recorder').value = rec.recorderName || '';
            document.getElementById('dr_bp').value = rec.bp === '-' ? '' : rec.bp;
            document.getElementById('dr_hr').value = rec.hr === '-' ? '' : rec.hr;
            document.getElementById('dr_rr').value = rec.rr === '-' ? '' : rec.rr;
            document.getElementById('dr_temp').value = rec.temp === '-' ? '' : rec.temp;
            document.getElementById('dr_o2').value = rec.o2 === '-' ? '' : rec.o2;
            document.getElementById('dr_pain').value = rec.pain || 0;
            document.getElementById('dr_dyspnea').value = rec.dyspnea || 0;
            document.getElementById('dr_dep').value = rec.depression || 0;
            document.getElementById('dr_cons').value = rec.constipation || 0;
            
            // ถอดบันทึกรวม MDT ออกมาเป็นช่องแบบอิสระแยกส่วน
            const mdt = parseCompiledMDTNotes(rec.note);
            document.getElementById('dr_note_doctor').value = mdt.doctor;
            document.getElementById('dr_note_nurse').value = mdt.nurse;
            document.getElementById('dr_note_pt').value = mdt.pt;
            document.getElementById('dr_note_other').value = mdt.other;

            document.getElementById('dailyRecordModal').classList.remove('hidden');
        };

        window.closeDailyRecordForm = function() {
            document.getElementById('dailyRecordModal').classList.add('hidden');
        };

        window.handleSaveDailyRecord = async function(e, patientId) {
            e.preventDefault();
            
            // รวมบันทึกจากสหสาขาวิชาชีพแยกช่องเป็นข้อความก้อนเดียวเพื่อรองรับตาราง db เดิม
            const noteDoc = document.getElementById('dr_note_doctor').value.trim();
            const noteNurse = document.getElementById('dr_note_nurse').value.trim();
            const notePt = document.getElementById('dr_note_pt').value.trim();
            const noteOther = document.getElementById('dr_note_other').value.trim();

            let compiledNote = '';
            if (noteDoc) compiledNote += `[แพทย์]: ${noteDoc}\n`;
            if (noteNurse) compiledNote += `[พยาบาล]: ${noteNurse}\n`;
            if (notePt) compiledNote += `[นักกายภาพ]: ${notePt}\n`;
            if (noteOther) compiledNote += `[อื่นๆ]: ${noteOther}\n`;
            
            compiledNote = compiledNote.trim();

            const recordData = {
                patientId: patientId,
                date: document.getElementById('dr_date').value,
                bp: document.getElementById('dr_bp').value || '-',
                hr: document.getElementById('dr_hr').value || '-',
                rr: document.getElementById('dr_rr').value || '-',
                temp: document.getElementById('dr_temp').value || '-',
                o2: document.getElementById('dr_o2').value || '-',
                pain: parseInt(document.getElementById('dr_pain').value) || 0,
                dyspnea: parseInt(document.getElementById('dr_dyspnea').value) || 0,
                depression: parseInt(document.getElementById('dr_dep').value) || 0,
                constipation: parseInt(document.getElementById('dr_cons').value) || 0,
                note: compiledNote,
                recorderName: document.getElementById('dr_recorder').value
            };

            try {
                if(window.editingRecordId) {
                    // ทำการแก้ไขข้อมูลเดิม
                    const { error } = await supabaseClient
                        .from('daily_records')
                        .update(recordData)
                        .eq('id', window.editingRecordId);
                    if (error) throw error;
                    alert('อัปเดตบันทึกข้อมูลเรียบร้อยแล้ว');
                } else {
                    // ทำการเพิ่มข้อมูลใหม่
                    const { error } = await supabaseClient
                        .from('daily_records')
                        .insert(recordData);
                    if (error) throw error;
                    alert('บันทึกอาการประจำวันสำเร็จ');
                }

                closeDailyRecordForm();
                await fetchInitialData();
            } catch (error) {
                console.error('Error saving daily record:', error);
                alert('เกิดข้อผิดพลาดในการบันทึกข้อมูลอาการ: ' + error.message);
            }
        };

        // --- EXPORT TO EXCEL LOGIC ---
        window.exportAllToExcel = function(filterType) {
            const list = state.patients.filter(p => {
                if (filterType === 'discharged') return p.status === 'Discharged';
                return p.status !== 'Discharged';
            });

            if(list.length === 0) { alert('ไม่มีข้อมูลผู้ป่วยที่เลือก'); return; }
            
            const exportData = list.map(p => ({
                'HN': p.hn,
                'ชื่อ-สกุล': p.name,
                'อายุ': p.age,
                'เพศ': p.gender,
                'ประเภทผู้ป่วย': p.patientType,
                'ระดับ ADL': p.adlScore,
                'วันที่รับดูแล': p.admissionDate,
                'การวินิจฉัยโรค': p.diagnosis,
                'ประวัติรพ.': p.hospitalHistory,
                'สิทธิ์การรักษา': p.insurance,
                'สถานะกู้ชีพ (POLST)': p.polst,
                'แผนล่วงหน้า (ACP)': p.acp,
                'ชื่อญาติ': p.relativeName,
                'เบอร์โทรศัพท์': p.relativePhone
            }));

            const ws = XLSX.utils.json_to_sheet(exportData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "PatientList");
            XLSX.writeFile(wb, `Patients_${filterType === 'discharged' ? 'Discharged_History' : 'Active_List'}.xlsx`);
        };

        window.exportPatientData = function(patientId) {
            const p = state.patients.find(x => x.id === patientId);
            const records = state.dailyRecords.filter(r => r.patientId === patientId);
            
            const infoData = [{
                'HN': p.hn, 'ชื่อ-สกุล': p.name, 'อายุ': p.age, 'เพศ': p.gender,
                'ประวัติรพ.': p.hospitalHistory, 'โรคประจำตัว': p.underlyingDiseases, 'การวินิจฉัย': p.diagnosis,
                'POLST': p.polst, 'ACP': p.acp,
                'ชื่อญาติ': p.relativeName, 'เบอร์ติดต่อ': p.relativePhone
            }];
            const wsInfo = XLSX.utils.json_to_sheet(infoData);

            const medicationsData = (p.medicationsList || []).map(m => ({
                'ชื่อยา': m.name,
                'ขนาด (Dose)': m.dosage,
                'วิธีใช้ (Frequency)': m.frequency
            }));
            const wsMeds = XLSX.utils.json_to_sheet(medicationsData);

            const bloodTestData = (p.bloodTestsList || []).map(b => ({
                'ปี พ.ศ.': b.year,
                'FBS (mg/dL)': b.fbs,
                'HbA1C (%)': b.hba1c,
                'eGFR (mL/min/1.73 m2)': b.egfr,
                'Cholesterol (mg/dL)': b.chol,
                'HDL (mg/dL)': b.hdl,
                'LDL (mg/dL)': b.ldl,
                'Triglyceride (mg/dL)': b.tg
            }));
            const wsBlood = XLSX.utils.json_to_sheet(bloodTestData);

            const recordData = records.map(r => ({
                'วันที่': r.date,
                'BP': r.bp, 'HR': r.hr, 'RR': r.rr, 'Temp': r.temp, 'SpO2': r.o2,
                'ปวด (0-10)': r.pain, 'เหนื่อย (0-10)': r.dyspnea, 
                'ซึมเศร้า (0-10)': r.depression, 'ท้องผูก (0-10)': r.constipation,
                'หมายเหตุ': r.note, 'ผู้บันทึก': r.recorderName
            }));
            const wsRecords = XLSX.utils.json_to_sheet(recordData);

            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, wsInfo, "ข้อมูลทั่วไป");
            if(medicationsData.length > 0) XLSX.utils.book_append_sheet(wb, wsMeds, "ยาประจำตัว");
            if(bloodTestData.length > 0) XLSX.utils.book_append_sheet(wb, wsBlood, "ผลเลือดประจำปี");
            if(recordData.length > 0) XLSX.utils.book_append_sheet(wb, wsRecords, "บันทึกอาการรายวัน");
            
            XLSX.writeFile(wb, `Patient_Data_${p.hn || p.name}.xlsx`);
        };

        // --- INIT ---
        window.onload = () => {
            navigate('dashboard');
            fetchInitialData();
        };
    </script>
</body>
