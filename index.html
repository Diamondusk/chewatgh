<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการสถานชีวาภิบาล วัดทับคล้อ (Smart Palliative)</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- SheetJS (Excel Export) -->
    <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- html2pdf.js for PDF Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Prompt', sans-serif; background-color: #f3f4f6; }
        .tab-active { border-bottom: 2px solid #0ea5e9; color: #0ea5e9; font-weight: 600; }
        .tab-inactive { color: #6b7280; }
        .tab-inactive:hover { color: #374151; }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Animation for Allergy Alert */
        @keyframes pulse-soft {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; background-color: #fee2e2; }
        }
        .allergy-alert { animation: pulse-soft 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }

        /* PDF Page break utility */
        .html2pdf__page-break { page-break-before: always; }
    </style>
</head>
<body class="text-gray-800 h-screen flex overflow-hidden">

    <!-- Sidebar (Collapsible on Mobile & Desktop) -->
    <aside id="sidebar" class="w-64 bg-white shadow-md flex-shrink-0 flex flex-col z-20 transition-all duration-300 absolute inset-y-0 left-0 transform -translate-x-full md:relative md:translate-x-0">
        <div class="p-6 border-b border-gray-100 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <i class="ph ph-heartbeat text-3xl text-rose-500"></i>
                <div>
                    <h1 class="font-bold text-lg leading-tight text-gray-800">สถานชีวาภิบาล</h1>
                    <p class="text-xs text-gray-500">วัดทับคล้อ</p>
                </div>
            </div>
            <!-- Close btn for mobile -->
            <button onclick="toggleSidebar()" class="md:hidden text-gray-500 hover:text-gray-800">
                <i class="ph ph-x text-2xl"></i>
            </button>
        </div>
        <nav class="flex-1 p-4 space-y-1 overflow-y-auto">
            <button onclick="navigate('dashboard')" id="nav-dashboard" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left transition-colors text-gray-600 hover:bg-sky-50 hover:text-sky-600">
                <i class="ph ph-squares-four text-xl"></i><span>แดชบอร์ด</span>
            </button>
            <button onclick="navigate('patients')" id="nav-patients" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left transition-colors text-gray-600 hover:bg-sky-50 hover:text-sky-600">
                <i class="ph ph-users text-xl"></i><span>รายชื่อผู้ป่วยปัจจุบัน</span>
            </button>
            <button onclick="navigate('pharmacy')" id="nav-pharmacy" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left transition-colors text-gray-600 hover:bg-purple-50 hover:text-purple-600">
                <i class="ph ph-pill text-xl"></i><span>ระบบเภสัชกรรม (Pharmacy)</span>
            </button>
            <button onclick="navigate('add-patient')" id="nav-add-patient" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left transition-colors text-gray-600 hover:bg-sky-50 hover:text-sky-600">
                <i class="ph ph-user-plus text-xl"></i><span>ลงทะเบียนผู้ป่วยใหม่</span>
            </button>
            <button onclick="navigate('discharged')" id="nav-discharged" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left transition-colors text-gray-600 hover:bg-rose-50 hover:text-rose-600 mt-4">
                <i class="ph ph-user-minus text-xl"></i><span>ประวัติ Discharge</span>
            </button>
        </nav>
        <div class="p-4 border-t border-gray-100 text-[10px] text-green-600 font-medium text-center bg-green-50">
            <i class="ph ph-cloud-check"></i> Connected to Supabase v2.0
        </div>
    </aside>

    <!-- Overlay for mobile sidebar -->
    <div id="sidebar-overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black bg-opacity-50 z-10 hidden md:hidden"></div>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-screen overflow-hidden bg-gray-50">
        <!-- Header -->
        <header class="bg-white shadow-sm px-4 md:px-8 py-4 flex justify-between items-center z-0">
            <div class="flex items-center gap-3">
                <button onclick="toggleSidebar()" class="text-gray-500 hover:text-sky-600 focus:outline-none md:hidden">
                    <i class="ph ph-list text-2xl"></i>
                </button>
                <h2 id="page-title" class="text-lg md:text-xl font-semibold text-gray-700 truncate">แดชบอร์ด</h2>
            </div>
            <div class="flex items-center gap-4">
                <span class="text-sm text-gray-500 hidden md:inline"><i class="ph ph-clock mr-1"></i> <span id="current-date"></span></span>
                <div class="h-8 w-8 rounded-full bg-sky-100 text-sky-600 flex items-center justify-center font-bold text-sm">จน</div>
            </div>
        </header>

        <!-- Dynamic Content Area -->
        <div id="app-content" class="flex-1 overflow-y-auto p-4 md:p-8">
            <!-- Content gets injected here -->
        </div>
    </main>

    <script>
        // --- UI UTILS ---
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        }

        // --- SUPABASE SETUP ---
        const SUPABASE_URL = 'https://hompmaasqrbuwxejswun.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhvbXBtYWFzcXJidXd4ZWpzd3VuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzMjY5NTAsImV4cCI6MjA5NTkwMjk1MH0.QvnuDBUU5g_EZtE3Vkc_1hc7xXmZlvrIR0eFRGqpaQM';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // --- STATE ---
        const state = {
            currentView: 'dashboard',
            patients: [],
            dailyRecords: [],
            selectedPatientId: null,
            detailTab: 'info', // info, medical, pharmacy, records
            pharmaTab: 'pending_pharmacy', // pending_pharmacy, dispensed, received
            filters: { type: 'all', adl: 'all', search: '' }
        };

        window.tempMedications = [];
        window.tempBloodTests = [];
        window.editingRecordId = null;

        // Rx Modal State
        window.rxTempList = [];
        window.editingRxIndex = null;
        window.editingRxPatientId = null;

        // --- FETCH DATA ---
        async function fetchInitialData() {
            try {
                const { data: patientsData, error: err1 } = await supabaseClient.from('patients').select('*');
                if (err1) throw err1;
                state.patients = patientsData || [];

                const { data: recordsData, error: err2 } = await supabaseClient.from('daily_records').select('*');
                if (err2) throw err2;
                state.dailyRecords = recordsData || [];

                render();
            } catch (error) {
                console.error('Error fetching data:', error);
                alert('ไม่สามารถเชื่อมต่อ Supabase ได้ กรุณาตรวจสอบ Internet และ RLS');
            }
        }

        // --- UTILITIES ---
        const formatDate = (dateStr) => {
            if(!dateStr) return '-';
            const d = new Date(dateStr);
            return d.toLocaleDateString('th-TH', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        };
        const parseBP = (bpStr) => {
            if(!bpStr || !bpStr.includes('/')) return { sys: null, dia: null };
            const parts = bpStr.split('/');
            return { sys: parseInt(parts[0]) || null, dia: parseInt(parts[1]) || null };
        };
        function parseCompiledMDTNotes(noteStr) {
            let result = { doctor: '', nurse: '', pt: '', other: '' };
            if (!noteStr) return result;
            const docMatch = noteStr.match(/\[แพทย์\]:\s*([\s\S]*?)(?=\[|$)/);
            const nurseMatch = noteStr.match(/\[พยาบาล\]:\s*([\s\S]*?)(?=\[|$)/);
            const ptMatch = noteStr.match(/\[นักกายภาพ\]:\s*([\s\S]*?)(?=\[|$)/);
            const otherMatch = noteStr.match(/\[อื่นๆ\]:\s*([\s\S]*?)(?=\[|$)/);
            result.doctor = docMatch ? docMatch[1].trim() : '';
            result.nurse = nurseMatch ? nurseMatch[1].trim() : '';
            result.pt = ptMatch ? ptMatch[1].trim() : '';
            result.other = otherMatch ? otherMatch[1].trim() : '';
            if (!result.doctor && !result.nurse && !result.pt && !result.other) result.other = noteStr;
            return result;
        }

        document.getElementById('current-date').innerText = new Date().toLocaleDateString('th-TH', { year: 'numeric', month: 'long', day: 'numeric' });

        // --- ROUTING ---
        function navigate(view, params = {}) {
            state.currentView = view;
            state.selectedPatientId = params.patientId || null;
            if(params.tab) state.detailTab = params.tab;
            
            if (view === 'add-patient') {
                const p = state.selectedPatientId ? state.patients.find(x => x.id === state.selectedPatientId) : {};
                window.tempMedications = p.medicationsList ? JSON.parse(JSON.stringify(p.medicationsList)) : [];
                window.tempBloodTests = p.bloodTestsList ? JSON.parse(JSON.stringify(p.bloodTestsList)) : [];
            }
            
            document.querySelectorAll('nav button').forEach(btn => {
                btn.classList.remove('bg-sky-100', 'text-sky-700', 'font-medium', 'bg-rose-100', 'text-rose-700', 'bg-purple-100', 'text-purple-700');
                btn.classList.add('text-gray-600');
            });
            
            const activeNavId = `nav-${view === 'patient-detail' ? 'patients' : view}`;
            const activeBtn = document.getElementById(activeNavId);
            if(activeBtn) {
                activeBtn.classList.remove('text-gray-600');
                if (view === 'discharged') activeBtn.classList.add('bg-rose-100', 'text-rose-700', 'font-medium');
                else if (view === 'pharmacy') activeBtn.classList.add('bg-purple-100', 'text-purple-700', 'font-medium');
                else activeBtn.classList.add('bg-sky-100', 'text-sky-700', 'font-medium');
            }

            const titles = {
                'dashboard': 'แดชบอร์ดอัจฉริยะ',
                'patients': 'ระบบจัดการรายชื่อผู้ป่วยปัจจุบัน',
                'pharmacy': 'ระบบเภสัชกรรม (Smart Pharmacy)',
                'discharged': 'ประวัติผู้ป่วยที่จำหน่ายแล้ว (Discharge)',
                'add-patient': 'ลงทะเบียน/แก้ไขข้อมูลผู้ป่วย',
                'patient-detail': 'รายละเอียดและบันทึกการรักษา'
            };
            document.getElementById('page-title').innerText = titles[view] || 'ระบบจัดการสถานชีวาภิบาล';

            // Close mobile sidebar on navigate
            document.getElementById('sidebar').classList.add('-translate-x-full');
            document.getElementById('sidebar-overlay').classList.add('hidden');

            render();
        }

        function render() {
            const content = document.getElementById('app-content');
            content.innerHTML = '';
            switch(state.currentView) {
                case 'dashboard': renderDashboard(content); break;
                case 'patients': renderPatients(content, 'active'); break;
                case 'discharged': renderPatients(content, 'discharged'); break;
                case 'pharmacy': renderPharmacy(content); break;
                case 'add-patient': renderPatientForm(content); break;
                case 'patient-detail': renderPatientDetail(content); break;
            }
        }

        // --- 1. DASHBOARD ---
        function renderDashboard(container) {
            const activePatients = state.patients.filter(p => p.status !== 'Discharged');
            const total = activePatients.length;
            const pal = activePatients.filter(p => p.patientType && p.patientType.includes('Palliative')).length;
            const imc = activePatients.filter(p => p.patientType && p.patientType.includes('Intermediate')).length;
            const eld = total - pal - imc;

            // นับใบสั่งยาที่ค้างจ่าย (Pending Pharmacy)
            let pendingRx = 0;
            activePatients.forEach(p => {
                if(p.prescriptions) {
                    pendingRx += p.prescriptions.filter(rx => rx.status === 'pending_pharmacy').length;
                }
            });

            container.innerHTML = `
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                    <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                        <p class="text-gray-500 text-xs md:text-sm">ผู้ป่วยทั้งหมด (Active)</p>
                        <h3 class="text-2xl md:text-3xl font-bold text-gray-800 mt-1">${total} <span class="text-sm font-normal">คน</span></h3>
                    </div>
                    <div class="bg-white p-5 rounded-2xl shadow-sm border border-l-4 border-rose-500">
                        <p class="text-gray-500 text-xs md:text-sm">Palliative Care</p>
                        <h3 class="text-2xl md:text-3xl font-bold text-rose-600 mt-1">${pal} <span class="text-sm font-normal">คน</span></h3>
                    </div>
                    <div class="bg-white p-5 rounded-2xl shadow-sm border border-l-4 border-teal-500">
                        <p class="text-gray-500 text-xs md:text-sm">Intermediate (IMC)</p>
                        <h3 class="text-2xl md:text-3xl font-bold text-teal-600 mt-1">${imc} <span class="text-sm font-normal">คน</span></h3>
                    </div>
                    <div onclick="navigate('pharmacy')" class="bg-purple-50 p-5 rounded-2xl shadow-sm border border-purple-200 cursor-pointer hover:bg-purple-100 transition">
                        <p class="text-purple-700 text-xs md:text-sm font-medium"><i class="ph ph-bell-ringing"></i> ใบสั่งยารอจ่าย</p>
                        <h3 class="text-2xl md:text-3xl font-bold text-purple-700 mt-1">${pendingRx} <span class="text-sm font-normal">รายการ</span></h3>
                    </div>
                </div>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                        <h4 class="font-semibold text-gray-700 mb-4">สัดส่วนตามประเภทผู้ป่วย</h4>
                        <div class="h-64 flex justify-center">${total === 0 ? '<p class="text-gray-400 mt-20">ไม่มีข้อมูล</p>' : '<canvas id="dashTypeChart"></canvas>'}</div>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                        <h4 class="font-semibold text-gray-700 mb-4">แนวโน้มอาการเฉลี่ย (ตัวอย่าง)</h4>
                        <div class="h-64"><canvas id="symptomChart"></canvas></div>
                    </div>
                </div>
            `;

            setTimeout(() => {
                if(total > 0) {
                    new Chart(document.getElementById('dashTypeChart'), {
                        type: 'doughnut',
                        data: {
                            labels: ['Palliative Care', 'Intermediate (IMC)', 'Elderly Care'],
                            datasets: [{
                                data: [pal, imc, eld],
                                backgroundColor: ['#e11d48', '#0d9488', '#2563eb']
                            }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
                    });
                }
                new Chart(document.getElementById('symptomChart'), {
                    type: 'bar',
                    data: {
                        labels: ['ปวด (Pain)', 'เหนื่อย (Dyspnea)', 'ซึมเศร้า (Depression)', 'ท้องผูก (Constipation)'],
                        datasets: [{
                            label: 'คะแนนเฉลี่ย',
                            data: [3.1, 2.4, 1.8, 3.5],
                            backgroundColor: ['#ef4444', '#3b82f6', '#64748b', '#a855f7']
                        }]
                    },
                    options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, max: 10 } } }
                });
            }, 100);
        }

        // --- 2. PATIENT LIST (WITH FILTERS) ---
        function renderPatients(container, filterType = 'active') {
            const updateFilter = () => {
                state.filters.type = document.getElementById('filter_type').value;
                state.filters.adl = document.getElementById('filter_adl').value;
                state.filters.search = document.getElementById('search_input').value.toLowerCase();
                renderPatientTable(filterType);
            };

            container.innerHTML = `
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 flex flex-col h-full">
                    <!-- Filters Area -->
                    <div class="p-4 border-b border-gray-100 bg-gray-50 flex flex-col md:flex-row gap-3 items-center rounded-t-2xl">
                        <div class="relative w-full md:w-1/3">
                            <i class="ph ph-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                            <input type="text" id="search_input" value="${state.filters.search}" placeholder="ค้นหา HN, ชื่อ, โรค..." class="w-full pl-10 pr-4 py-2 border border-gray-200 rounded-lg text-sm focus:ring-1 focus:ring-sky-500">
                        </div>
                        <select id="filter_type" class="w-full md:w-1/4 border border-gray-200 rounded-lg py-2 px-3 text-sm focus:ring-sky-500">
                            <option value="all">ทุกประเภทผู้ป่วย</option>
                            <option value="Palliative" ${state.filters.type==='Palliative'?'selected':''}>Palliative Care</option>
                            <option value="Intermediate" ${state.filters.type==='Intermediate'?'selected':''}>Intermediate Care (IMC)</option>
                            <option value="Elderly" ${state.filters.type==='Elderly'?'selected':''}>Elderly Care</option>
                        </select>
                        <select id="filter_adl" class="w-full md:w-1/4 border border-gray-200 rounded-lg py-2 px-3 text-sm focus:ring-sky-500">
                            <option value="all">ทุกระดับ ADL</option>
                            <option value="สมบูรณ์" ${state.filters.adl==='สมบูรณ์'?'selected':''}>พึ่งพิงสมบูรณ์ (0-4)</option>
                            <option value="บางส่วน" ${state.filters.adl==='บางส่วน'?'selected':''}>พึ่งพิงบางส่วน (5-11)</option>
                            <option value="ตัวเองได้" ${state.filters.adl==='ตัวเองได้'?'selected':''}>ช่วยเหลือตัวเองได้ (12+)</option>
                        </select>
                        <button onclick="exportAllToExcel('${filterType}')" class="w-full md:w-auto px-4 py-2 bg-green-50 text-green-700 rounded-lg text-sm font-medium border border-green-200 hover:bg-green-100">
                            <i class="ph ph-file-xls"></i> Export Excel
                        </button>
                    </div>
                    <div class="overflow-x-auto flex-1">
                        <table class="w-full text-left border-collapse whitespace-nowrap">
                            <thead class="bg-white sticky top-0 shadow-sm text-gray-500 text-xs uppercase tracking-wider">
                                <tr>
                                    <th class="py-3 px-4 font-medium border-b">HN / ข้อมูล</th>
                                    <th class="py-3 px-4 font-medium border-b">ประเภท / ADL</th>
                                    <th class="py-3 px-4 font-medium border-b">การวินิจฉัย (Dx)</th>
                                    <th class="py-3 px-4 font-medium border-b text-center">ประวัติแพ้ยา</th>
                                    <th class="py-3 px-4 font-medium border-b text-center">จัดการ</th>
                                </tr>
                            </thead>
                            <tbody id="patient-table-body"></tbody>
                        </table>
                        <div id="no-patients-alert" class="hidden text-center py-12 text-gray-400">ไม่มีข้อมูลผู้ป่วยที่ตรงตามเงื่อนไข</div>
                    </div>
                </div>
            `;
            
            document.getElementById('search_input').addEventListener('input', updateFilter);
            document.getElementById('filter_type').addEventListener('change', updateFilter);
            document.getElementById('filter_adl').addEventListener('change', updateFilter);
            
            renderPatientTable(filterType);
        }

        function renderPatientTable(filterType) {
            const { type, adl, search } = state.filters;
            
            let list = state.patients.filter(p => filterType === 'discharged' ? p.status === 'Discharged' : p.status !== 'Discharged');

            // Apply Filters
            if (type !== 'all') list = list.filter(p => p.patientType && p.patientType.includes(type));
            if (adl !== 'all') list = list.filter(p => p.adlScore && p.adlScore.includes(adl));
            if (search) {
                list = list.filter(p => 
                    (p.hn||'').toLowerCase().includes(search) || 
                    (p.name||'').toLowerCase().includes(search) || 
                    (p.diagnosis||'').toLowerCase().includes(search)
                );
            }

            const tbody = document.getElementById('patient-table-body');
            const alertDiv = document.getElementById('no-patients-alert');

            if(list.length === 0) {
                tbody.innerHTML = '';
                alertDiv.classList.remove('hidden');
            } else {
                alertDiv.classList.add('hidden');
                tbody.innerHTML = list.map(p => {
                    const hasAllergy = p.allergies && p.allergies.trim() !== '' && p.allergies.trim() !== '-';
                    const allergyBadge = hasAllergy 
                        ? `<span class="px-2 py-1 bg-red-100 text-red-700 text-[10px] rounded-full font-bold allergy-alert cursor-help" title="${p.allergies}">แพ้ยา</span>` 
                        : `<span class="text-gray-300 text-xs">-</span>`;
                    
                    return `
                        <tr class="border-b border-gray-50 hover:bg-sky-50 transition-colors">
                            <td class="py-3 px-4">
                                <div class="font-bold text-gray-800">${p.name || '-'}</div>
                                <div class="text-[11px] text-gray-500">HN: ${p.hn || '-'} | ${p.age||'-'}ปี ${p.gender||'-'}</div>
                            </td>
                            <td class="py-3 px-4">
                                <div class="text-xs text-sky-700 bg-sky-50 inline-block px-2 py-0.5 rounded">${p.patientType || '-'}</div>
                                <div class="text-[11px] text-gray-500 mt-1">${p.adlScore || '-'}</div>
                            </td>
                            <td class="py-3 px-4 text-xs text-gray-600 truncate max-w-[200px]" title="${p.diagnosis}">${p.diagnosis || '-'}</td>
                            <td class="py-3 px-4 text-center">${allergyBadge}</td>
                            <td class="py-3 px-4 text-center">

        // --- 3. SMART PHARMACY VIEW ---
        window.setPharmaTab = function(tab) {
            state.pharmaTab = tab;
            renderPharmacy(document.getElementById('app-content'));
        };

            const activePatients = state.patients.filter(p => p.status !== 'Discharged');
            
            // รวบรวมใบสั่งยาทั้งหมด
            let allRx = [];

                if(p.prescriptions) {
                    p.prescriptions.forEach((rx, idx) => {
                        allRx.push({ patient: p, rx: rx, rxIndex: idx });
                    });
                }
            });

            // กรองตามแท็บ
            const filteredRx = allRx.filter(item => item.rx.status === state.pharmaTab);
            filteredRx.sort((a,b) => new Date(b.rx.date) - new Date(a.rx.date));

            container.innerHTML = `
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 flex flex-col h-full">

                            <button onclick="setPharmaTab('dispensed')" class="pb-2 px-1 text-sm whitespace-nowrap transition-colors ${state.pharmaTab==='dispensed' ? 'border-b-2 border-blue-500 text-blue-700 font-bold' : 'text-gray-500 hover:text-gray-700'}">เภสัชกรจ่ายยาแล้ว 🔵</button>
                            <button onclick="setPharmaTab('received')" class="pb-2 px-1 text-sm whitespace-nowrap transition-colors ${state.pharmaTab==='received' ? 'border-b-2 border-green-500 text-green-700 font-bold' : 'text-gray-500 hover:text-gray-700'}">เจ้าหน้าที่รับยาแล้ว 🟢</button>
                        </div>
                    </div>
                    
                    <div class="p-4 flex-1 overflow-y-auto space-y-4">

                            } else if (rx.status === 'dispensed') {
                                actionBtn = `<button onclick="updateRxStatus('${patient.id}', '${rx.id}', 'received')" class="bg-emerald-600 text-white px-4 py-1.5 rounded shadow text-xs font-semibold hover:bg-emerald-700 w-full md:w-auto">ยืนยันรับยา (เจ้าหน้าที่)</button>`;
                            }

                            return `
                                <div class="border ${hasAllergy ? 'border-red-300' : 'border-gray-200'} rounded-xl p-4 bg-white shadow-sm flex flex-col md:flex-row gap-4 relative">
                                    <div class="absolute top-4 right-4 flex gap-2">

                                        </div>
                                        <p class="text-[10px] text-gray-500 mb-2"><i class="ph ph-clock"></i> สั่งเมื่อ: ${formatDate(rx.date)}<br>โดย: แพทย์ ${rx.doctor}</p>
                                        ${hasAllergy ? `<div class="bg-red-50 text-red-700 text-xs p-2 rounded border border-red-200 allergy-alert"><b>⚠️ แพ้ยา:</b> ${patient.allergies}</div>` : ''}

        window.updateRxStatus = async function(patientId, rxId, newStatus) {
            const p = state.patients.find(x => x.id === patientId);
            if(!p || !p.prescriptions) return;
            const rxIndex = p.prescriptions.findIndex(r => r.id === rxId);
            if(rxIndex === -1) return;

            let name = prompt(`กรุณากรอกชื่อ${newStatus === 'dispensed' ? 'ผู้จ่ายยา (เภสัชกร)' : 'เจ้าหน้าที่ผู้รับยา'}:`);
            if(name === null) return; // cancelled
            if(name.trim() === '') name = 'ไม่ระบุชื่อ';

            p.prescriptions[rxIndex].status = newStatus;
            if(newStatus === 'dispensed') {
                p.prescriptions[rxIndex].pharmacist = name;
                p.prescriptions[rxIndex].dispensedDate = new Date().toISOString();
            } else {
                p.prescriptions[rxIndex].receiver = name;
                p.prescriptions[rxIndex].receivedDate = new Date().toISOString();
            }

            try {
                const { error } = await supabaseClient.from('patients').update({ prescriptions: p.prescriptions }).eq('id', patientId);
                if(error) throw error;
                fetchInitialData(); // Auto re-renders
            } catch (e) {
                alert('อัปเดตสถานะล้มเหลว: ' + e.message);
            }
        };

        window.handleAddBloodTest = function() {
            const b = {
                year: parseInt(document.getElementById('add_blood_year').value) || new Date().getFullYear() + 543,
                fbs: parseInt(document.getElementById('add_blood_fbs').value) || null,
                hba1c: parseFloat(document.getElementById('add_blood_hba1c').value) || null,
                egfr: parseFloat(document.getElementById('add_blood_egfr').value) || null,
                chol: parseInt(document.getElementById('add_blood_chol').value) || null,
                hdl: parseInt(document.getElementById('add_blood_hdl').value) || null,
                ldl: parseInt(document.getElementById('add_blood_ldl').value) || null,
                tg: parseInt(document.getElementById('add_blood_tg').value) || null
            };
            window.tempBloodTests.push(b);
            ['fbs','hba1c','egfr','chol','hdl','ldl','tg'].forEach(id => document.getElementById('add_blood_'+id).value = '');

        };

        window.handleSavePatient = async function(e) {

            const newId = idInput ? idInput : 'P' + Math.floor(Math.random() * 10000).toString().padStart(4, '0');
            const oldP = state.patients.find(x => x.id === idInput) || {};

            const newData = {
                id: newId,
                hn: document.getElementById('f_hn').value,
                name: document.getElementById('f_name').value,
                age: parseInt(document.getElementById('f_age').value) || null,
                gender: document.getElementById('f_gender').value,
                insurance: document.getElementById('f_insurance').value,
                admissionDate: document.getElementById('f_admission').value,
                patientType: document.getElementById('f_type').value,
                adlScore: document.getElementById('f_adl').value,
                allergies: document.getElementById('f_allergies').value,
                hospitalHistory: document.getElementById('f_hospitalHistory').value,
                relativeName: document.getElementById('f_relativeName').value,
                relativeRelation: document.getElementById('f_relativeRelation').value,
                relativePhone: document.getElementById('f_relativePhone').value,
                diagnosis: document.getElementById('f_dx').value,
                underlyingDiseases: document.getElementById('f_underlying').value,
                otherLabs: document.getElementById('f_otherLabs').value,
                polst: document.getElementById('f_polst').value,
                acp: document.getElementById('f_acp').value,
                bloodTestsList: [...window.tempBloodTests],
                status: oldP.status || 'Active',
                medicationsList: oldP.medicationsList || [], // Preserve meds
                prescriptions: oldP.prescriptions || [] // Preserve prescriptions
            };

            try {
                const { error } = await supabaseClient.from('patients').upsert(newData);
                if (error) throw error;
                alert('บันทึกข้อมูลสำเร็จ!');
                await fetchInitialData();
                navigate('patient-detail', {patientId: newId});
            } catch (error) {
                alert('เกิดข้อผิดพลาด: ' + error.message);
            }
        };

        // --- PHARMACY RX ACTIONS (ADD/EDIT/REMEDICATION) ---
        window.openPrescriptionModal = function(patientId) {
            window.editingRxPatientId = patientId;
            window.editingRxIndex = null;
            window.rxTempList = [];
            
            document.getElementById('rx_modal_title').innerHTML = '<i class="ph-fill ph-stethoscope"></i> สั่งยา / ปรับยาใหม่ (New Prescription)';
            document.getElementById('rx_doctor').value = '';
            document.getElementById('rx_plan').value = '';
            renderRxTempList();
            document.getElementById('rxModal').classList.remove('hidden');
        };

        window.openRemedicationModal = function(patientId) {
            const p = state.patients.find(x => x.id === patientId);
            if(!p) return;
            
            window.editingRxPatientId = patientId;
            window.editingRxIndex = null; // ถือเป็นการสร้างใบสั่งยาใหม่
            
            // ดึงยาปัจจุบันมาเป็นพื้นฐาน
            window.rxTempList = p.medicationsList ? p.medicationsList.map(m => ({medName: m.name, dose: m.dosage, freq: m.frequency})) : [];
            
            document.getElementById('rx_modal_title').innerHTML = '<i class="ph-fill ph-arrows-clockwise"></i> Remedication (สั่งยาเดิมต่อเนื่อง)';
            document.getElementById('rx_doctor').value = '';
            document.getElementById('rx_plan').value = 'Remedication (สั่งจ่ายยาเดิมต่อเนื่อง)';
            renderRxTempList();
            document.getElementById('rxModal').classList.remove('hidden');
        };

        window.openEditRxModal = function(patientId, rxId) {
            const p = state.patients.find(x => x.id === patientId);
            if(!p || !p.prescriptions) return;
            
            const rxIndex = p.prescriptions.findIndex(r => r.id === rxId);
            if(rxIndex === -1) return;

            const rx = p.prescriptions[rxIndex];
            
            window.editingRxPatientId = patientId;
            window.editingRxIndex = rxIndex;
            
            window.rxTempList = JSON.parse(JSON.stringify(rx.items));
            document.getElementById('rx_modal_title').innerHTML = '<i class="ph-fill ph-pencil-simple"></i> แก้ไขใบสั่งยา';
            document.getElementById('rx_doctor').value = rx.doctor || '';
            document.getElementById('rx_plan').value = rx.plan || '';
            
            renderRxTempList();
            document.getElementById('rxModal').classList.remove('hidden');
        };

        window.closePrescriptionModal = function() {
            document.getElementById('rxModal').classList.add('hidden');
        };

        window.renderRxTempList = function() {
            const container = document.getElementById('rx_temp_list');
            if(!container) return;
            container.innerHTML = window.rxTempList.map((i, idx) => `
                <li class="p-2 border-b flex justify-between items-center bg-gray-50">
                    <span class="font-medium">${i.medName} <span class="text-gray-500 font-normal">- ${i.dose} (${i.freq})</span></span>
                    <button type="button" onclick="removeRxItem(${idx})" class="text-red-500 hover:text-red-700 p-1"><i class="ph ph-trash"></i></button>
                </li>
            `).join('') || '<li class="text-center text-gray-400 py-2">ยังไม่มีรายการยา</li>';
        }

        window.addRxItem = function() {
            const mName = document.getElementById('rx_medName').value.trim();
            const mDose = document.getElementById('rx_dose').value.trim();
            const mFreq = document.getElementById('rx_freq').value.trim();
            if(!mName) return;
            window.rxTempList.push({ medName: mName, dose: mDose, freq: mFreq });
            document.getElementById('rx_medName').value=''; document.getElementById('rx_dose').value=''; document.getElementById('rx_freq').value='';
            renderRxTempList();
        };

        window.removeRxItem = function(idx) {
            window.rxTempList.splice(idx, 1);
            renderRxTempList();
        }

        window.handleSaveRx = async function(e) {
            e.preventDefault();
            if(window.rxTempList.length === 0) { alert('กรุณาเพิ่มยาอย่างน้อย 1 รายการ'); return; }
            
            const patientId = window.editingRxPatientId;
            const docName = document.getElementById('rx_doctor').value;
            const plan = document.getElementById('rx_plan').value;
            
            const p = state.patients.find(x=>x.id===patientId);
            const rxList = p.prescriptions || [];
            
            if (window.editingRxIndex !== null) {
                // อัปเดตใบสั่งยาเดิม
                rxList[window.editingRxIndex].doctor = docName;
                rxList[window.editingRxIndex].items = window.rxTempList;
                rxList[window.editingRxIndex].plan = plan;
            } else {
                // สร้างใหม่
                const rxId = 'RX' + Date.now();
                rxList.push({
                    id: rxId, date: new Date().toISOString(), doctor: docName,
                    items: window.rxTempList, plan: plan,
                    status: 'pending_pharmacy', pharmacist: '', receiver: ''
                });
            }

            // นำรายการในใบสั่งยา (ใบที่แก้ล่าสุด/สร้างใหม่) ไปอัปเดตเป็นยาปัจจุบัน
            const newMedsList = window.rxTempList.map(i => ({ name: i.medName, dosage: i.dose, frequency: i.freq }));

            try {
                const { error } = await supabaseClient.from('patients').update({ prescriptions: rxList, medicationsList: newMedsList }).eq('id', patientId);
                if(error) throw error;
                alert('บันทึกข้อมูลใบสั่งยาเรียบร้อย!');
                closePrescriptionModal();
                await fetchInitialData();
            } catch(err) { alert('Error: ' + err.message); }
        };

        // --- DAILY RECORD ACTIONS (ADD / EDIT / DELETE) ---

            window.editingRecordId = null;

            const now = new Date();
            // local datetime format for input
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            document.getElementById('dr_date').value = now.toISOString().slice(0,16);
            
            document.getElementById('dr_recorder').value = ""; document.getElementById('dr_bp').value = "";
            document.getElementById('dr_hr').value = ""; document.getElementById('dr_rr').value = ""; document.getElementById('dr_temp').value = ""; document.getElementById('dr_o2').value = "";
            document.getElementById('dr_pain').value = 0; document.getElementById('dr_dyspnea').value = 0; document.getElementById('dr_dep').value = 0; document.getElementById('dr_cons').value = 0;
            document.getElementById('dr_note_doctor').value = ""; document.getElementById('dr_note_nurse').value = ""; document.getElementById('dr_note_pt').value = ""; document.getElementById('dr_note_other').value = "";
            document.getElementById('dailyRecordModal').classList.remove('hidden');
        };

        window.openDailyRecordFormForEdit = function(recordId) {
            window.editingRecordId = recordId;
            const rec = state.dailyRecords.find(x => x.id.toString() === recordId.toString());
            if(!rec) return;
            document.getElementById('dr_modal_title').innerText = "แก้ไขบันทึก";
            document.getElementById('dr_date').value = rec.date ? rec.date.slice(0,16) : '';
            document.getElementById('dr_recorder').value = rec.recorderName || '';
            document.getElementById('dr_bp').value = rec.bp==='-'?'':rec.bp; document.getElementById('dr_hr').value = rec.hr==='-'?'':rec.hr; document.getElementById('dr_rr').value = rec.rr==='-'?'':rec.rr; document.getElementById('dr_temp').value = rec.temp==='-'?'':rec.temp; document.getElementById('dr_o2').value = rec.o2==='-'?'':rec.o2;
            document.getElementById('dr_pain').value = rec.pain||0; document.getElementById('dr_dyspnea').value = rec.dyspnea||0; document.getElementById('dr_dep').value = rec.depression||0; document.getElementById('dr_cons').value = rec.constipation||0;
            
            const mdt = parseCompiledMDTNotes(rec.note);
            document.getElementById('dr_note_doctor').value = mdt.doctor; document.getElementById('dr_note_nurse').value = mdt.nurse; document.getElementById('dr_note_pt').value = mdt.pt; document.getElementById('dr_note_other').value = mdt.other;
            document.getElementById('dailyRecordModal').classList.remove('hidden');
        };

        window.closeDailyRecordForm = function() { document.getElementById('dailyRecordModal').classList.add('hidden'); };

        window.handleSaveDailyRecord = async function(e, patientId) {
            e.preventDefault();
            const noteDoc = document.getElementById('dr_note_doctor').value.trim();
            const noteNurse = document.getElementById('dr_note_nurse').value.trim();
            const notePt = document.getElementById('dr_note_pt').value.trim();
            const noteOther = document.getElementById('dr_note_other').value.trim();
            let compiledNote = '';
            if (noteDoc) compiledNote += `[แพทย์]: ${noteDoc}\n`;
            if (noteNurse) compiledNote += `[พยาบาล]: ${noteNurse}\n`;
            if (notePt) compiledNote += `[นักกายภาพ]: ${notePt}\n`;
            if (noteOther) compiledNote += `[อื่นๆ]: ${noteOther}\n`;
            
            const recordData = {
                patientId: patientId, date: document.getElementById('dr_date').value,
                bp: document.getElementById('dr_bp').value || '-', hr: document.getElementById('dr_hr').value || '-', rr: document.getElementById('dr_rr').value || '-', temp: document.getElementById('dr_temp').value || '-', o2: document.getElementById('dr_o2').value || '-',
                pain: parseInt(document.getElementById('dr_pain').value)||0, dyspnea: parseInt(document.getElementById('dr_dyspnea').value)||0, depression: parseInt(document.getElementById('dr_dep').value)||0, constipation: parseInt(document.getElementById('dr_cons').value)||0,
                note: compiledNote.trim(), recorderName: document.getElementById('dr_recorder').value
            };

            try {
                if(window.editingRecordId) await supabaseClient.from('daily_records').update(recordData).eq('id', window.editingRecordId);
                else await supabaseClient.from('daily_records').insert(recordData);
                closeDailyRecordForm();
                await fetchInitialData();
            } catch (err) { alert('เกิดข้อผิดพลาด: ' + err.message); }
        };

        window.handleDeleteDailyRecord = async function(recordId) {
            if(!confirm('คุณแน่ใจหรือไม่ว่าต้องการลบบันทึกอาการรายวันนี้?')) return;
            try {
                const { error } = await supabaseClient.from('daily_records').delete().eq('id', recordId);
                if(error) throw error;
                await fetchInitialData();
            } catch(e) { alert('ลบข้อมูลไม่สำเร็จ: '+e.message); }
        };

        // --- PDF EXPORT (MULTI-PAGE) ---
        window.exportToPDF = function(patientId) {
            const element = document.getElementById('pdf-report-template');
            element.classList.remove('hidden');
            const p = state.patients.find(x=>x.id===patientId);
            const opt = {
                margin:       0,
                filename:     `Summary_Report_${p.hn||p.name}.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save().then(() => element.classList.add('hidden'));
        };

        // --- EXPORT TO EXCEL ---
        window.exportAllToExcel = function(filterType) {
            const { type, adl, search } = state.filters;
            let list = state.patients.filter(p => filterType === 'discharged' ? p.status === 'Discharged' : p.status !== 'Discharged');
            if (type !== 'all') list = list.filter(p => p.patientType && p.patientType.includes(type));
            if (adl !== 'all') list = list.filter(p => p.adlScore && p.adlScore.includes(adl));
            if(list.length === 0) { alert('ไม่มีข้อมูล'); return; }
            
            const ws = XLSX.utils.json_to_sheet(list.map(p => ({
                'HN': p.hn, 'ชื่อ': p.name, 'อายุ': p.age, 'แพ้ยา': p.allergies, 'ประเภท': p.patientType
            })));
            XLSX.writeFile(XLSX.utils.book_append_sheet(XLSX.utils.book_new(), ws, "Patients"), "Patients.xlsx");
        };

        window.handleDischarge = async function(e, patientId) {
            e.preventDefault();
            const date = document.getElementById('dis_date').value;
            const reason = document.getElementById('dis_reason').value;
            const note = document.getElementById('dis_note').value;

            try {
                const { error } = await supabaseClient
                    .from('patients')
                    .update({
                        status: 'Discharged',
                        dischargeDate: date,
                        dischargeReason: reason,
                        dischargeNote: note
                    })
                    .eq('id', patientId);

                if (error) throw error;

                alert('จำหน่ายผู้ป่วยออกจากสถานชีวาภิบาลเรียบร้อยแล้ว');
                closeDischargeModal();
                await fetchInitialData();
                navigate('discharged');
            } catch (error) {
                console.error('Error discharging:', error);
                alert('เกิดข้อผิดพลาดในการจำหน่ายผู้ป่วย: ' + error.message);
            }
        };

        window.handleReAdmit = async function(patientId) {
            if(!confirm('คุณต้องการรับผู้ป่วยรายนี้กลับเข้ามาดูแลรักษารอบใหม่ใช่หรือไม่?')) return;
            try {
                const { error } = await supabaseClient
                    .from('patients')
                    .update({
                        status: 'Active',
                        dischargeDate: null,
                        dischargeReason: null,
                        dischargeNote: null
                    })
                    .eq('id', patientId);

                if (error) throw error;

                alert('รับผู้ป่วยรายเดิมกลับเข้ามาดูแลอีกครั้งเรียบร้อย');
                await fetchInitialData();
                navigate('patients');
            } catch (error) {
                console.error('Error re-admit:', error);
                alert('เกิดข้อผิดพลาดในการรับดูแลใหม่: ' + error.message);
            }
        };

        // --- INIT ---
        window.onload = () => { navigate('dashboard'); fetchInitialData(); };
    </script>
</body>
</html>
